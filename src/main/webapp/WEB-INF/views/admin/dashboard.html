<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layouts/layout-admin :: layout(~{::main})}">
<body>
<main id="main" class="main">

    <div class="pagetitle">
        <h1>메인보드</h1>
        <nav>
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="#">Home</a></li>
                <li class="breadcrumb-item active">메인관리</li>
            </ol>
        </nav>
    </div>

    <section class="section dashboard">
        <div class="row">
            <!-- 카드 3개 -->
            <div class="col-xxl-4 col-md-6">
                <div class="card info-card">
                    <div class="card-body">
                        <h5 class="card-title">신규 입고</h5>
                        <div class="d-flex align-items-center">
                            <div class="card-icon bg-primary text-white rounded-circle d-flex align-items-center justify-content-center" style="width:40px; height:40px;">
                                <i class="bi bi-cart-plus"></i>
                            </div>
                            <div class="ps-3">
                                <h6>7건</h6>
                                <span class="text-muted small pt-2 ps-1">대기 중</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-xxl-4 col-md-6">
                <div class="card info-card">
                    <div class="card-body">
                        <h5 class="card-title">신규 출고</h5>
                        <div class="d-flex align-items-center">
                            <div class="card-icon bg-danger text-white rounded-circle d-flex align-items-center justify-content-center" style="width:40px; height:40px;">
                                <i class="bi bi-box-arrow-up"></i>
                            </div>
                            <div class="ps-3">
                                <h6>1건</h6>
                                <span class="text-muted small pt-2 ps-1">출고 준비</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-xxl-4 col-md-6">
                <div class="card info-card">
                    <div class="card-body">
                        <h5 class="card-title">신규 주문</h5>
                        <div class="d-flex align-items-center">
                            <div class="card-icon bg-warning text-white rounded-circle d-flex align-items-center justify-content-center" style="width:40px; height:40px;">
                                <i class="bi bi-people-fill"></i>
                            </div>
                            <div class="ps-3">
                                <h6>251건</h6>
                                <span class="text-muted small pt-2 ps-1">접수 완료</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 차트 -->
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">일일 주문량</h5>
                        <canvas id="myChart" style="max-height: 300px;"></canvas>
                    </div>
                </div>
            </div>

            <!-- 테이블 -->
            <div class="col-lg-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">베스트 상품</h5>
                        <table class="table">
                            <thead>
                            <tr>
                                <th>#</th>
                                <th>상품명</th>
                                <th>주문 수</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr><td>1</td><td>김치찌개</td><td>265</td></tr>
                            <tr><td>2</td><td>된장찌개</td><td>238</td></tr>
                            <tr><td>3</td><td>냉동피자</td><td>210</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </section>
</main>


</body>
</html>
