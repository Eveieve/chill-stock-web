<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{member/layouts/layout-user :: layout(~{::main})}">
<body>

<main id="main" class="main">
    <!-- 성공 메시지 알림 (3초 후 사라짐) -->
    <div id="successAlert" class="alert alert-success fade show text-center mt-3" th:if="${successMessage}">
        <span th:text="${successMessage}">입고 요청이 완료되었습니다.</span>
    </div>

    <div class="pagetitle">
        <h1>입고 요청</h1>
        <nav>
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="#">Home</a></li>
                <li class="breadcrumb-item active">입고 요청</li>
            </ol>
        </nav>
    </div>

    <section class="section">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">등록된 제품 리스트</h5>


                <form th:action="@{/member/inbound-request}" method="post">

                    <!-- ✅ 테이블 -->
                    <table class="table table-bordered text-center align-middle">
                        <thead>
                        <tr>
                            <th>제품명</th>
                            <th>크기(m²)</th>
                            <th>보관온도(℃)</th>
                            <th>유통기한</th>
                            <th>체크박스</th>
                        </tr>
                        </thead>
                        <tbody>
                        <!-- ✅ 등록된 제품이 있을 때 -->
                        <tr th:each="product : ${myProducts}">
                            <td th:text="${product.productName}">제품명</td>
                            <td th:text="${product.productSize}">2</td>
                            <td th:text="${product.storageTemperature}">10</td>
                            <td th:text="${#temporals.format(product.expirationDate, 'yyyy-MM-dd')}"></td>
                            <td>
                                <input type="radio" name="productId" th:value="${product.productId}" required>
                            </td>
                        </tr>

                        <!-- ✅ 등록된 제품이 없을 때 -->
                        <tr th:if="${#lists.isEmpty(myProducts)}">
                            <td colspan="5">등록된 제품이 없습니다.</td>
                        </tr>
                        </tbody>
                    </table>

                    <!-- ✅ 페이지네이션 (총 페이지 수가 0 이상일 때만 표시) -->
                    <nav th:if="${totalPages > 0}">
                        <ul class="pagination justify-content-center mt-4">

                            <!-- 이전 버튼 -->
                            <li class="page-item" th:classappend="${startPage == 1} ? 'disabled'">
                                <a class="page-link" th:href="@{/member/inbound-request(page=${startPage - 1})}">이전</a>
                            </li>

                            <!-- 페이지 번호 반복 -->
                            <th:block th:with="startPage=${((currentPage - 1) / 10) * 10 + 1},
                           endPage=${(startPage + 9) > totalPages ? totalPages : (startPage + 9)}">
                                <li class="page-item" th:each="i : ${#numbers.sequence(startPage, endPage)}"
                                    th:classappend="${i == currentPage} ? 'active'">
                                    <a class="page-link" th:href="@{/member/inbound-request(page=${i})}" th:text="${i}">1</a>
                                </li>
                            </th:block>

                            <!-- 다음 버튼 -->
                            <li class="page-item" th:classappend="${endPage == totalPages} ? 'disabled'">
                                <a class="page-link" th:href="@{/member/inbound-request(page=${endPage + 1})}">다음</a>
                            </li>

                        </ul>
                    </nav>


            </div>
        </div>
    </section>

    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
            const alert = document.getElementById("successAlert");
            if (alert) {
                setTimeout(function () {
                    alert.classList.remove("show"); // 트랜지션 시작
                    setTimeout(() => alert.remove(), 500); // 서서히 사라진 후 완전 제거
                }, 3000); // 3초 후 시작
            }
        });
    </script>

</main>
</body>
</html>
