<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<!-- 올바른 head 예시 -->
<head>
    <meta charset="UTF-8">
    <title>비밀번호 재설정</title>
    <link rel="stylesheet" th:href="@{/assets/css/style.css}" />
    <link rel="stylesheet" th:href="@{/assets/vendor/bootstrap-icons/font/bootstrap-icons.css}" />
    <script th:src="@{/assets/vendor/bootstrap/js/bootstrap.bundle.js}"></script>
</head>

<body>

<!-- ✅ 첫 번째 화면: 로그인 아이디 입력 (페이지 전체로 보여짐) -->
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <form action="/find-password" method="post">
                <h2 class="mb-4 text-center">비밀번호 재설정</h2>

                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="userLoginId" name="userLoginId" placeholder="아이디 입력" required
                           th:value="${passwordResetDTO?.userLoginId}">
                    <label for="userLoginId">로그인 아이디</label>
                </div>

                <div th:if="${errorMessage}" class="text-danger mb-3" th:text="${errorMessage}"></div>

                <div class="text-center">
                    <button type="submit" class="btn btn-primary w-100">다음</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ✅ 두 번째 단계: 비밀번호 재설정 모달 -->
<div class="modal fade" id="resetPasswordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form action="/find-password" method="post">
                <input type="hidden" name="userLoginId" th:value="${passwordResetDTO?.userLoginId}" />
                <div class="modal-header">
                    <h5 class="modal-title">새 비밀번호 입력</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
                </div>
                <div class="modal-body">
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" name="newPassword" placeholder="새 비밀번호" required>
                        <label>새 비밀번호</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" name="newPasswordCheck" placeholder="비밀번호 확인" required>
                        <label>비밀번호 확인</label>
                    </div>
                    <div class="text-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-success w-100">변경</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ✅ 세 번째 단계: 성공 모달 -->
<div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">변경 완료</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="닫기"></button>
            </div>
            <div class="modal-body">
                <p>비밀번호가 성공적으로 변경되었습니다.</p>
                <p>로그인 아이디: <strong th:text="${loginId}">sampleId</strong></p>
            </div>
            <div class="modal-footer">
                <a href="/nonuser/login" class="btn btn-primary w-100">로그인 하러 가기</a>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->

<!-- 모달 단계 제어 -->
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const modalStep = /*[[${modalStep}]]*/ 'loginId';
        if (modalStep === 'password') {
            new bootstrap.Modal(document.getElementById('resetPasswordModal')).show();
        } else if (modalStep === 'success') {
            new bootstrap.Modal(document.getElementById('successModal')).show();
        }
    });
</script>
</body>
</html>
