<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{member/layouts/layout-user :: layout(~{::main})}">
<body>
<main id="main" class="main">
    <div class="pagetitle">
        <h1>Stock Status</h1>
        <nav>
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/member/dashboard">Dashboard</a></li>
                <li class="breadcrumb-item active">Stock Status</li>
            </ol>
        </nav>
    </div>
    <section class="section">
        <form th:action="@{/member/stock}" method="get" class="mb-3">
            <input type="text" name="productName" class="form-control d-inline-block w-auto" placeholder="Search product name">
            <button type="submit" class="btn btn-primary">Search</button>
        </form>
        <table class="table table-bordered text-center align-middle">
            <thead>
            <tr>
                <th>Stock ID</th>
                <th>Product ID</th>
                <th>Product Name</th>
                <th>Expiration Date</th>
                <th>Stock Quantity</th>
                <th>Inbound Date</th>
                <th>Select</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="stock : ${stockList}">
                <td th:text="${stock.stock_id}"></td>
                <td th:text="${stock.product_id}"></td>
                <td th:text="${stock.product_name}"></td>
                <td th:text="${#dates.format(stock.expiration_date, 'yyyy-MM-dd')}"></td>
                <td th:text="${stock.stock_amount}"></td>
                <td th:text="${stock.inbound_date}"></td>
            </tr>
            </tbody>
        </table>
        <div class="d-flex justify-content-between align-items-center mt-3">
            <div>
                <label for="outboundAmount">Outbound Quantity:</label>
                <input type="number" id="outboundAmount" name="outboundAmount" class="form-control d-inline-block w-auto">
                <button class="btn btn-primary" type="submit">Request Outbound</button>
            </div>
            <nav th:if="${totalPages > 0}">
                <ul class="pagination mb-0">
                    <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/member/stock(page=${currentPage - 1})}">Previous</a>
                    </li>

                    <th:block th:with="startPage=${((currentPage - 1) / 10) * 10 + 1}, endPage=${(startPage + 9) > totalPages ? totalPages : (startPage + 9)}">
                        <li class="page-item" th:each="i : ${#numbers.sequence(startPage, endPage)}"
                            th:classappend="${i == currentPage} ? 'active'">
                            <a class="page-link" th:href="@{/member/stock(page=${i})}" th:text="${i}">1</a>
                        </li>
                    </th:block>

                    <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                        <a class="page-link" th:href="@{/member/stock(page=${currentPage + 1})}">Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    </section>
</main>
</body>
</html>
