<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layouts/layout-admin :: layout(~{::main})}">
<body>
<main id="main" class="main">
  <div class="pagetitle">
    <h1>창고 상세정보</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="#">Home</a></li>
        <li class="breadcrumb-item active">창고 상세정보</li>
      </ol>
    </nav>
  </div>

  <section class="section dashboard">
    <div class="row g-2 justify-content-start">

      <div class="col-md-4">
        <div class="custom-box">
          <div class="fw-bold fs-6 mb-1" style="color: #0d3c84;">창고 ID</div>
          <div class="fs-6" style="color: #0d3c84;" th:text="${warehouse.warehouseId}">1</div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="custom-box">
          <div class="fw-bold fs-6 mb-1" style="color: #0d3c84;">창고 이름</div>
          <div class="fs-6" style="color: #0d3c84;" th:text="${warehouse.warehouseName}">창고 A</div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="custom-box">
          <div class="fw-bold fs-6 mb-1" style="color: #0d3c84;">창고 크기</div>
          <div class="fs-6" style="color: #0d3c84;" th:text="${warehouse.warehouseSpace + ' ㎡'}">500 ㎡</div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="custom-box">
          <div class="fw-bold fs-6 mb-1" style="color: #0d3c84;">창고 주소</div>
          <div class="fs-6" style="color: #0d3c84;" th:text="${warehouse.warehouseAddress}">서울특별시...</div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="custom-box">
          <div class="fw-bold fs-6 mb-1" style="color: #0d3c84;">고정 지출 금액</div>
          <div class="fs-6" style="color: #0d3c84;" th:text="${#numbers.formatInteger(warehouse.warehouseAmount, 3, 'COMMA') + ' 원'}">100,000 원</div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="custom-box">
          <div class="fw-bold fs-6 mb-1" style="color: #0d3c84;">남은 공간</div>
          <div class="fs-6" style="color: #0d3c84;" th:text="${remainSpace + ' ㎡'}">300 ㎡</div>
        </div>
      </div>

    </div>
  </section>

  <style>
    .custom-box {
      background-color: rgba(100, 149, 237, 0.25);
      height: 80px;
      width: 80%;
      padding: 12px;
      border-radius: 1rem;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      word-break: break-word;
      transition: all 0.3s ease;
      cursor: default;
    }

    .custom-box:hover {
      background-color: rgba(100, 149, 237, 0.35); /* hover 시 배경 살짝 밝게 */
      transform: translateY(-4px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    }
  </style>


  <h4 class="col-12 align-center" style="color: #0d3c84; margin-top: 30px;">구역 리스트</h4>

  <div class="mt-3 text-end">
    <button type="button" class="btn btn-primary" onclick="openStorageModal()">온도 변경</button>
  </div>

  <div class="col-12 mt-4">
    <div class="table-responsive">
      <table class="table table-bordered table-hover align-middle text-center">
        <thead class="table-light">
        <tr>
          <th>구역 번호</th>
          <th>구역 크기(m2)</th>
          <th>구역 코드</th>
          <th>구역 가격(m2/원)</th>
          <th>보관 온도</th>
          <th>남은 공간(m2)</th>
          <th>선택</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="areaList, stat : ${areaList}">
          <td th:text="${areaList.areaId}">id</td>
          <td th:text="${areaList.areaSpace}">구역 공간</td>
          <td th:text="${areaList.areaCode}">구역 코드</td>
          <td th:text="${areaList.areaPrice}">가격</td>
          <td th:text="${areaList.storageMessage}">온도</td>
          <td th:text="${areaList.remainSpace}">남은 공간</td>
          <td>
            <input type="radio" name="selectedArea"
                   th:value="${areaList.areaId}"
                   th:attr="data-warehouse-id=${areaList.warehouseId}">
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(areaList)}">
          <td colspan="6">등록된 구역이 없습니다.</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 온도 변경 모달 -->
  <div class="modal fade" id="storageModal" tabindex="-1" aria-labelledby="storageModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <form id="storageUpdateForm" method="post" th:action="@{/admin/area/update-storage}">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="storageModalLabel">보관 온도 변경</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="selectedAreaId" name="areaId">
            <input type="hidden" id="selectedStorageId" name="storageId">
            <input type="hidden" id="selectedWarehouseId" name="warehouseId">

            <div class="d-flex flex-wrap gap-2 justify-content-center">
              <button type="button" class="btn btn-outline-primary storage-btn" data-id="1">Ultra-Low_Temp</button>
              <button type="button" class="btn btn-outline-primary storage-btn" data-id="2">Frozen_Storage</button>
              <button type="button" class="btn btn-outline-primary storage-btn" data-id="3">Refrigerated_Storage</button>
              <button type="button" class="btn btn-outline-primary storage-btn" data-id="4">Cool_Storage</button>
              <button type="button" class="btn btn-outline-primary storage-btn" data-id="5">Room_Temperature</button>
              <button type="button" class="btn btn-outline-primary storage-btn" data-id="6">Heated_Storage</button>
            </div>

            <div class="mt-3 text-center">
              <small style="color: gray;">변경할 보관 온도를 선택해주세요</small>
            </div>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-primary" id="confirmButton" disabled>변경</button>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script>
    function openStorageModal() {
      const selectedRadio = document.querySelector('input[name="selectedArea"]:checked');
      if (!selectedRadio) {
        alert("변경할 구역을 선택해주세요.");
        return;
      }
      document.getElementById('selectedAreaId').value = selectedRadio.value;
      document.getElementById('selectedWarehouseId').value = selectedRadio.getAttribute('data-warehouse-id');

      // 초기화
      document.getElementById('selectedStorageId').value = "";
      document.querySelectorAll('.storage-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('confirmButton').disabled = true;

      const modal = new bootstrap.Modal(document.getElementById('storageModal'));
      modal.show();
    }

    document.querySelectorAll('.storage-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.storage-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.getElementById('selectedStorageId').value = this.getAttribute('data-id');
        document.getElementById('confirmButton').disabled = false;
      });
    });
  </script>

</main>
</body>
</html>
