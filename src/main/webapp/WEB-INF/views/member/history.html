<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{member/layouts/layout-user :: layout(~{::main})}">
<body>
<main id="main" class="main">
  <div class="pagetitle">
    <h1>Dashboard</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="#">Home</a></li>
        <li class="breadcrumb-item active">Transaction History</li>
      </ol>
    </nav>
  </div>

  <section class="section dashboard">
    <!-- Inbound Requests Section -->
    <div style="margin-bottom: 30px;">
      <h2>Inbound Requests</h2>
      <div style="max-height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 10px;" class="border-primary">
        <table border="1" class="table table-bordered table-hover align-middle text-center" style="width: 100%;">
          <thead class="table-light">
          <tr>
            <th>Inbound ID</th>
            <th>Inbound Date</th>
            <th>Request Date</th>
            <th>Status</th>
            <th>Quantity</th>
            <th>Product Name</th>
            <th>Rejection Reason</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="inbound : ${inboundList}">
            <td th:text="${inbound.inbound_id}"></td>
            <td th:text="${inbound.inbound_date}"></td>
            <td th:text="${inbound.inbound_request_date}"></td>
            <td th:text="${inbound.inbound_status == '대기' ? 'Pending' : (inbound.inbound_status == '승인' ? 'Approved' : (inbound.inbound_status == '반려' ? 'Rejected' : inbound.inbound_status))}"></td>
            <td th:text="${inbound.inbound_amount}"></td>
            <td th:text="${inbound.product_name}"></td>
            <td th:text="${inbound.reject_reason_message}"></td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Outbound Requests Section -->
    <div>
      <h2>Outbound Requests</h2>
      <div style="max-height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 10px;" class="border-primary">
        <table border="1" class="table table-bordered table-hover align-middle text-center" style="width: 100%;">
          <thead class="table-light">
          <tr>
            <th>Outbound ID</th>
            <th>Outbound Date</th>
            <th>Request Date</th>
            <th>Status</th>
            <th>Quantity</th>
            <th>Product Name</th>
            <th>Rejection Reason</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="outbound : ${outboundList}">
            <td th:text="${outbound.outbound_id}"></td>
            <td th:text="${outbound.outbound_date}"></td>
            <td th:text="${outbound.outbound_request_date}"></td>
            <td th:text="${outbound.outbound_status == '대기' ? 'Pending' : (outbound.outbound_status == '승인' ? 'Approved' : (outbound.outbound_status == '반려' ? 'Rejected' : outbound.outbound_status))}"></td>
            <td th:text="${outbound.outbound_amount}"></td>
            <td th:text="${outbound.product_name}"></td>
            <td th:text="${outbound.reject_reason_message}"></td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>
</main>
</body>
</html>
