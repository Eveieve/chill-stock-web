<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{member/layouts/layout-user :: layout(~{::main})}">
<body>

<main id="main" class="main">

    <div class="pagetitle">
        <h1>Product Registration</h1>
        <nav>
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/member/dashboard">Dashboard</a></li>
                <li class="breadcrumb-item active">Product Registration</li>
            </ol>
        </nav>
    </div>

    <section class="section">
        <!-- ✅ 제품 등록 폼 -->
        <form th:action="@{/member/product-register}" th:object="${productDTO}" method="post" class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Product Name</label>
                <input type="text" th:field="*{productName}" class="form-control" placeholder="e.g., Frozen Dumplings" required>
            </div>

            <div class="col-md-3">
                <label class="form-label">Product Size (m²)</label>
                <input type="number" th:field="*{productSize}" class="form-control" required>
            </div>

            <div class="col-md-3">
                <label class="form-label">Storage Temperature (°C)</label>
                <input type="number" th:field="*{storageTemperature}" class="form-control">
            </div>

            <div class="col-md-4">
                <label class="form-label">Expiration Date</label>
                <input type="date" th:field="*{expirationDate}" class="form-control"
                       th:attr="min=${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Main Category</label>
                <select id="mainCategory" class="form-select" th:field="*{categoryMainId}">
                    <option value="">Select Main Category</option>
                    <option th:each="main : ${mainCategories}"
                            th:value="${main.categoryId}"
                            th:text="${main.categoryName}">
                    </option>
                </select>
            </div>

            <div class="col-md-4">
                <label class="form-label">Sub Category</label>
                <select id="midCategory" class="form-select" th:field="*{categoryMidId}">
                    <option value="">Select Sub Category</option>
                    <option th:each="mid : ${midCategories}"
                            th:value="${mid.categoryMidId}"
                            th:text="${mid.categoryName}"
                            th:attr="data-main-id=${mid.categoryMainId}">
                    </option>
                </select>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-primary">Register Product</button>
            </div>
        </form>

        <hr class="my-4" />

        <!-- ✅ 내 제품 리스트 -->
        <h5>Registered Product List</h5>
        <form th:action="@{/member/product-delete}" method="post"
              onsubmit="return confirm('Are you sure you want to delete the selected products?');">
            <table class="table">
                <thead>
                <tr>
                    <th id="selectAll"></th>
                    <th>Product Name</th>
                    <th>Size</th>
                    <th>Expiration Date</th>
                    <th>Storage Temp</th>
                    <th>Main Category</th>
                    <th>Sub Category</th>
                    <th>Edit</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${products}">
                    <td><input type="checkbox" name="productIdList" th:value="${p.productId}" /></td>
                    <td th:text="${p.productName}"></td>
                    <td th:text="${p.productSize} + '㎡'"></td>
                    <td th:text="${#temporals.format(p.expirationDate, 'yyyy-MM-dd')}"></td>
                    <td th:text="${p.storageTemperature} + '℃'"></td>
                    <td th:text="${p.categoryName}"></td>
                    <td th:text="${p.subCategoryName}"></td>
                    <td>
                        <button type="button" class="btn btn-sm btn-outline-secondary"
                                th:attr="
                                    data-id=${p.productId},
                                    data-name=${p.productName},
                                    data-size=${p.productSize},
                                    data-temp=${p.storageTemperature},
                                    data-date=${#temporals.format(p.expirationDate, 'yyyy-MM-dd')},
                                    data-mid=${p.categoryMidId}"
                                onclick="handleEditClick(this)"
                                data-bs-toggle="modal" data-bs-target="#editModal">
                            Edit
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
            <button type="submit" class="btn btn-danger">Select Delete</button>
        </form>

        <!-- ✅ 수정 모달 -->
        <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <form method="post" th:action="@{/member/product-update}">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Product Edit</h5>
                        </div>
                        <div class="modal-body">
                            <input type="hidden" name="productId" id="editProductId">
                            <label>Product Name</label>
                            <input type="text" name="productName" id="editProductName" class="form-control" required>
                            <label>Product Size</label>
                            <input type="number" name="productSize" id="editProductSize" class="form-control" required>
                            <label>Storage Temperature</label>
                            <input type="number" name="storageTemperature" id="editStorageTemp" class="form-control">
                            <label>Expiration Date</label>
                            <input type="date" name="expirationDate" id="editExpirationDate" class="form-control">
                            <label>Sub Category</label>
                            <select name="categoryMidId" id="editCategoryMidId" class="form-select">
                                <option th:each="mid : ${midCategories}" th:value="${mid.categoryMidId}" th:text="${mid.categoryName}"></option>
                            </select>
                        </div>
                        <div class="modal-footer">
                            <button type="submit" class="btn btn-primary">Edit</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>


        <!-- ✅ 페이징 -->
        <nav th:if="${totalPages > 1}" class="mt-3">
            <ul class="pagination">
                <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/member/product-register(page=${currentPage - 1})}">Previous</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/member/product-register(page=${i})}" th:text="${i}">1</a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{/member/product-register(page=${currentPage + 1})}">Next</a>
                </li>
            </ul>
        </nav>

    </section>


    <!-- ✅ JS: 데이터 채워주는 함수 (data-* 기반) -->
    <script>
        function handleEditClick(btn) {
            document.getElementById("editProductId").value = btn.dataset.id;
            document.getElementById("editProductName").value = btn.dataset.name;
            document.getElementById("editProductSize").value = btn.dataset.size;
            document.getElementById("editStorageTemp").value = btn.dataset.temp;
            document.getElementById("editExpirationDate").value = btn.dataset.date;
            document.getElementById("editCategoryMidId").value = btn.dataset.mid;
        }
    </script>
    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
            const alert = document.getElementById("successAlert");
            if (alert) {
                setTimeout(function () {
                    alert.classList.remove("show"); // 트랜지션 시작
                    setTimeout(() => alert.remove(), 500); // 서서히 사라진 후 완전 제거
                }, 3000); // 3초 후 시작
            }
        });
    </script>

    <script th:if="${pageName == 'product-register'}">
        document.addEventListener("DOMContentLoaded", function () {
            console.log("✅ 제품 등록 JS 작동 중");

            const mainSelect = document.getElementById('mainCategory');
            const midSelect = document.getElementById('midCategory');
            const checkAll = document.getElementById('selectAll');

            // ✅ 중분류 필터링
            if (mainSelect && midSelect) {
                filterMidCategories(mainSelect.value); // 페이지 최초 진입 시 필터링

                mainSelect.addEventListener('change', function () {
                    filterMidCategories(this.value);
                });

                function filterMidCategories(selectedMainId) {
                    const midOptions = midSelect.querySelectorAll('option');

                    midOptions.forEach(opt => {
                        const mainId = opt.getAttribute('data-main-id');
                        const isDefault = opt.value === "";
                        opt.style.display = (!mainId || mainId === selectedMainId || isDefault) ? 'block' : 'none';
                    });

                    midSelect.value = '';
                }
            }

            // ✅ 전체 선택/해제 체크박스
            if (checkAll) {
                checkAll.addEventListener('change', function () {
                    const checkboxes = document.querySelectorAll('input[name="productIdList"]');
                    checkboxes.forEach(cb => cb.checked = this.checked);
                });
            }
        });
    </script>


</main>


</body>
</html>
