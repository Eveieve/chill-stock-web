<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{member/layouts/layout-user :: layout(~{::main})}">
<body>
<main id="main" class="main">

  <div class="pagetitle">
    <h1>마이 페이지</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="#">Home</a></li>
        <li class="breadcrumb-item active">내정보 조회</li>
      </ol>
    </nav>
  </div>

  <section class="section profile">
    <div class="row">
      <div class="col-xl-8">

        <div class="card">
          <div class="card-body pt-3">
            <!-- Profile Overview Tab -->
            <div class="tab-pane fade show active profile-overview" id="profile-overview">

              <h5 class="card-title">상세 정보</h5>

              <div class="row">
                <div class="col-lg-3 col-md-4 label">아이디</div>
                <div class="col-lg-9 col-md-8" th:text="${user.userLoginId}">login_id</div>
              </div>

              <div class="row">
                <div class="col-lg-3 col-md-4 label">이름</div>
                <div class="col-lg-9 col-md-8" th:text="${user.userName}">홍길동</div>
              </div>

              <div class="row">
                <div class="col-lg-3 col-md-4 label">이메일</div>
                <div class="col-lg-9 col-md-8" th:text="${user.userEmail}">example@email.com</div>
              </div>

              <div class="row">
                <div class="col-lg-3 col-md-4 label">전화번호</div>
                <div class="col-lg-9 col-md-8" th:text="${user.userPhone}">010-1234-5678</div>
              </div>

              <div class="row">
                <div class="col-lg-3 col-md-4 label">회원유형</div>
                <div class="col-lg-9 col-md-8" th:switch="${user.userType.name()}">
                  <span th:case="'ROLE_member'">일반 회원</span>
                  <span th:case="'ROLE_admin'">총관리자</span>
                  <span th:case="*">알 수 없음</span>
                </div>
              </div>

              <h5 class="card-title mt-4">사업체 정보</h5>

              <div class="row">
                <div class="col-lg-3 col-md-4 label">사업체명</div>
                <div class="col-lg-9 col-md-8" th:text="${user.businessName}">ABC Corp</div>
              </div>

              <div class="row">
                <div class="col-lg-3 col-md-4 label">사업자번호</div>
                <div class="col-lg-9 col-md-8" th:text="${user.businessRegistNum}">123-45-67890</div>
              </div>

              <div class="row">
                <div class="col-lg-3 col-md-4 label">사업장 주소</div>
                <div class="col-lg-9 col-md-8" th:text="${user.businessAddress}">서울특별시 강남구 테헤란로</div>
              </div>

              <div class="row">
                <div class="col-lg-3 col-md-4 label">우편번호</div>
                <div class="col-lg-9 col-md-8" th:text="${user.businessPost}">06236</div>
              </div>

<!--              수정하기 버튼 -->
              <button type="button" onclick="handleEdit()">수정</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

<!--  마이페이지 수정모달-->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeEditModal()">&times;</span>
      <h2>회원 정보 수정</h2>
      <form onsubmit="event.preventDefault(); submitEditForm();">

        <label for="editMemberName">이름:</label>
        <input type="text" id="editMemberName" name="name" th:value="${user.userName}" required />
        <br><br>


        <label for="editMemberLoginId">아이디:</label>
        <input type="text" id="editMemberLoginId" name="name" th:value="${user.userLoginId}" readonly />
        <br><br>

        <label for="editMemberPhone">전화번호:</label>
        <input type="text" id="editMemberPhone" name="phone" th:value="${user.userPhone}" required />
        <br><br>

        <label for="editMemberEmail">이메일:</label>
        <input type="text" id="editMemberEmail" name="email" th:value="${user.userEmail}" readonly/>
        <br><br>

        <label for="editBusinessName">사업체명:</label>
        <input type="text" id="editBusinessName" name="businessName" th:value="${user.businessName}" required />
        <br><br>

        <label for="editBusinessRegistNum">사업자번호:</label>
        <input type="text" id="editBusinessRegistNum" name="businessRegistNum" th:value="${user.businessRegistNum}" required />
        <br><br>

        <label for="editBusinessAddress">사업장 주소:</label>
        <input type="text" id="editBusinessAddress" name="businessAddress" th:value="${user.businessAddress}" required />
        <br><br>

        <label for="editBusinessPost">우편번호:</label>
        <input type="text" id="editBusinessPost" name="businessPost" th:value="${user.businessPost}" required />
        <br><br>

        <button type="button" onclick="submitEditForm()">수정</button>
        <button type="button" onclick="closeEditModal()">취소</button>
      </form>
    </div>
  </div>


  <script>

    function submitEditForm() {
      const updateData = {
        userLoginId: document.getElementById('editMemberLoginId').value,
        userName: document.getElementById('editMemberName').value,
        userEmail: document.getElementById('editMemberEmail').value,
        userPhone: document.getElementById('editMemberPhone').value,
        businessName: document.getElementById('editBusinessName').value,
        businessRegistNum: document.getElementById('editBusinessRegistNum').value,
        businessAddress: document.getElementById('editBusinessAddress').value,
        businessPost: document.getElementById('editBusinessPost').value
      };

      fetch('/member/mypage-edit', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(updateData)
      })
              .then(response => {
                if (!response.ok) throw new Error('수정 실패');
                // 성공하면 마이페이지로 이동
                window.location.href = '/member/mypage';
              })
              .catch(error => {
                console.error('오류:', error);
                alert('수정에 실패했습니다.');
              });
    }

    // 서버에서 데이터 불러오기
    function handleEdit() {
      // 서버에서 현재 로그인한 회원 정보 불러오기
      fetch('/member/getmyinfo')
              .then(response => {
                if (!response.ok) {
                  throw new Error('회원 정보 요청 실패');
                }
                return response.json();
              })
              .then(data => {
                console.log(data);
                const userInfo = data.data;
                console.log(userInfo);

                // 입력 필드에 데이터 설정ß
                document.getElementById('editMemberName').value = userInfo.userName;
                document.getElementById('editMemberPhone').value = userInfo.userPhone;
                document.getElementById('editBusinessName').value = userInfo.businessName;
                document.getElementById('editBusinessRegistNum').value = userInfo.businessRegistNum;
                document.getElementById('editBusinessAddress').value = userInfo.businessAddress;
                document.getElementById('editBusinessPost').value = userInfo.businessPost;

                // 모달 보이기
                document.getElementById('editModal').style.display = 'block';
              })
              .catch(error => {
                console.error('오류 발생:', error);
                alert('회원 정보를 불러오는 데 실패했습니다.');
              });
    }

    function closeEditModal() {
      document.getElementById('editModal').style.display = 'none';
    }

  </script>
</main>
</body>
</html>
