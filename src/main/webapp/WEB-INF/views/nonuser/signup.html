<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{member/layouts/layout-user :: layout(~{::main})}">
<body>
<main id="main" class="main">

    <div class="pagetitle">
        <h1>Sign Up</h1>
        <nav>
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/">Home</a></li>
                <li class="breadcrumb-item active">Sign Up</li>
            </ol>
        </nav>
    </div>

    <section class="section">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-body p-4">

                        <h5 class="card-title mb-4">User Information</h5>

                        <!-- Added above form in signup.html -->
                        <div th:if="${signupSuccess}" class="modal-backdrop fade show"></div>
                        <div th:if="${signupSuccess}" class="modal fade show" id="signupSuccessModal" tabindex="-1" style="display:block;" aria-modal="true" role="dialog">
                            <div class="modal-dialog modal-dialog-centered">
                                <div class="modal-content rounded-2xl shadow-lg p-4">
                                    <div class="modal-header border-0">
                                        <h5 class="modal-title fw-bold">Sign Up Completed</h5>
<!--                                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>-->
                                    </div>
                                    <div class="modal-body">
                                        <p class="mb-0">Sign up has been completed successfully.</p>
                                    </div>
                                    <div class="modal-footer border-0">
                                        <!-- Click to go to login page -->
                                        <button type="button" class="btn btn-primary rounded-2xl px-4 py-2"
                                                onclick="location.href='/nonuser/login'">
                                            Go to Login
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>


<!--                        Failure modal -->
                        <div th:if="${errorMessage}" class="modal-backdrop fade show"></div>
                        <div th:if="${errorMessage}" class="modal fade show" id="signupFailModal" tabindex="-1" style="display:block;" aria-modal="true" role="dialog">
                            <div class="modal-dialog modal-dialog-centered">
                                <div class="modal-content rounded-2xl shadow-lg p-4">
                                    <div class="modal-header border-0">
                                        <h5 class="modal-title fw-bold">Sign Up Failed</h5>
<!--                                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" onclick="handleCloseFailModal()"></button>-->
                                    </div>
                                    <div class="modal-body">
                                        <p class="mb-0" th:text="${errorMessage}">Sign up failed.</p>
                                    </div>
                                    <div class="modal-footer border-0">
                                        <button type="button" class="btn btn-primary rounded-2xl px-4 py-2" data-bs-dismiss="modal" onclick="handleCloseFailModal()">
                                            OK
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <form th:object="${signUpDTO}" id="signUpForm" th:action="@{/nonuser/signup}" method="post" class="needs-validation" novalidate>
                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">아이디
<!--                                    <span class="text-danger" style="margin-left:4px;">*</span> &lt;!&ndash; 필수 표시 &ndash;&gt;-->
                                </label>
                                <div class="col-sm-9">
                                    <input type="text" id="userLoginId" th:field="*{userLoginId}" name="userLoginId" class="form-control" placeholder="아이디를 입력하세요">
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">Name
                                    <span class="text-danger" style="margin-left:4px;">*</span> <!-- Required field -->
                                </label>
                                <div class="col-sm-9">
                                    <input type="text" id="userName" th:field="*{userName}" name="userName" class="form-control" placeholder="Enter your name" required>
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end"> Login Email
                                    <span class="text-danger" style="margin-left:4px;">*</span> <!-- Required field -->
                                </label>
                                <div class="col-sm-9">
                                    <input type="email" id="userEmail" name="userEmail" th:field="*{userEmail}" class="form-control" placeholder="example@email.com" required>
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">전화번호</label>
                                <div class="col-sm-9">
                                    <input type="text" th:field="*{userPhone}" id="userPhone" name="userPhone" class="form-control" placeholder="010-1234-5678">
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">비밀번호
                                    <span class="text-danger" style="margin-left:4px;">*</span> <!-- 필수 표시 -->
                                </label>
                                <div class="col-sm-9">
                                    <input type="password" th:field="*{userPassword}" id="userPassword" name="userPassword" class="form-control" placeholder="비밀번호를 입력하세요" required>
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <label class="col-sm-3 col-form-label text-end">비밀번호 확인
                                    <span class="text-danger" style="margin-left:4px;">*</span> <!-- 필수 표시 -->
                                </label>
                                <div class="col-sm-9">
                                    <input type="password" th:field="*{userPasswordCheck}" id="userPasswordCheck" name="userPasswordCheck" class="form-control" placeholder="비밀번호를 다시 입력하세요" required>
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>

                            <h5 class="card-title mb-4">사업체 정보</h5>

                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">사업체명</label>
                                <div class="col-sm-9">
                                    <input type="text" th:field="*{businessName}"  id="businessName" name="businessName" class="form-control" placeholder="사업체명을 입력하세요">
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">사업자번호
                                    <span class="text-danger" style="margin-left:4px;">*</span> <!-- 필수 표시 -->
                                </label>
                                <div class="col-sm-9">
                                    <input type="text" th:field="*{businessRegistNum}" id="businessRegistNum" name="businessRegistNum" class="form-control" placeholder="000-00-00000">
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">사업장 주소
                                    <span class="text-danger" style="margin-left:4px;">*</span> <!-- 필수 표시 -->
                                </label>
                                <div class="col-sm-9">
                                    <input type="text" th:field="*{businessAddress}" id="businessAddress" name="businessAddress" class="form-control" placeholder="주소 검색을 이용하여 입력하세요" readonly>
                                    <div class="invalid-feedback"></div>
                                    <button type="button" class="btn btn-outline-secondary mt-2" onclick="execDaumPostcode()">주소 검색</button>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <label class="col-sm-3 col-form-label text-end">우편번호
                                    <span class="text-danger" style="margin-left:4px;">*</span> <!-- 필수 표시 -->
                                </label>
                                <div class="col-sm-9">
                                    <input type="text" th:field="*{businessPost}" id="businessPost" name="businessPost" class="form-control" placeholder="주소 검색 후 우편번호가 자동으로 입력됩니다" readonly>
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>

                            <div class="text-center">
                                <button type="submit" class="btn btn-primary w-50">가입하기</button>
                            </div>

                        </form>

                    </div>
                </div>
            </div>
        </div>
    </section>


    <script>

        // 유효성 검사 함수
        // 유효성 검사 조건
        const validators = {
            userLoginId: {
                regex: /^[a-zA-Z0-9_]{4,20}$/,
                message: '아이디는 4~20자, 영문자/숫자/언더스코어만 가능합니다.'
            },
            userName: {
                regex: /^[가-힣a-zA-Z\s]{2,30}$/,
                message: '이름은 한글, 영문, 공백 포함 2~30자여야 합니다.'
            },
            userEmail: {
                regex: /^[^\s@]+@[^\s@]+\.[^\s@]+$/,
                message: '이메일은 example@gmail.com의 형식이어야 합니다.'
            },
            userPhone: {
                regex: /^(01[016789])-?\d{3,4}-?\d{4}$|^\+1-\d{3}-\d{3}-\d{4}$/,
                message: '휴대폰 번호는 - 없이 작성해주세요.',
                optional: true
            },
            userPassword: {
                regex: /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d!@#$%^&*]{8,20}$/,
                message: '비밀번호는 영문+숫자 포함 8~20자여야 합니다.'
            },
            businessName: {
                regex: /^[가-힣a-zA-Z0-9\s]+$/,
                message: '사업체명은 한글, 영문, 숫자, 공백만 허용됩니다.',
                optional: true
            },
            businessRegistNum: {
                regex: /^\d{3}-\d{2}-\d{5}$/,
                message: '사업자번호는 000-00-00000 형식이어야 합니다.'
            },
            businessAddress: {
                regex: /^[가-힣a-zA-Z0-9\s,.-]{5,100}$/,
                message: '주소는 5~100자의 한글, 영문, 숫자, ,-., 공백만 허용됩니다.'
            },
            businessPost: {
                regex: /^\d{5}$|^[A-Z]\d[A-Z] ?\d[A-Z]\d$/,
                message: '우편번호는 5자리 숫자여야 합니다.'
            }
        };

        function validateField(input) {
            const id = input.id;
            const value = input.value.trim();
            const feedback = input.nextElementSibling;

            const rule = validators[id];
            if (!rule) return;

            if (!value && rule.optional) {
                input.classList.remove('is-invalid', 'is-valid');
                feedback.textContent = '';
                return;
            }

            if (!rule.regex.test(value)) {
                input.classList.add('is-invalid');
                input.classList.remove('is-valid'); //  에러일 때 성공 표시 제거
                feedback.textContent = rule.message;
            } else {
                input.classList.remove('is-invalid');
                input.classList.add('is-valid'); //  성공일 때 초록색 체크 표시
                feedback.textContent = '';
            }

            if (id === 'userPassword' || id === 'userPasswordCheck') {
                validatePasswordMatch();
            }
        }


        function validatePasswordMatch() {
            const pw = document.getElementById('userPassword');
            const pwCheck = document.getElementById('userPasswordCheck');
            const pwCheckFeedback = pwCheck.nextElementSibling;

            if (!pwCheck.value) {
                pwCheck.classList.remove('is-invalid', 'is-valid');
                pwCheckFeedback.textContent = '';
                return;
            }

            if (pw.value !== pwCheck.value) {
                pwCheck.classList.add('is-invalid');
                pwCheck.classList.remove('is-valid'); //  불일치할 때 성공 표시 제거
                pwCheckFeedback.textContent = '비밀번호와 일치하지 않습니다.';
            } else {
                pwCheck.classList.remove('is-invalid');
                pwCheck.classList.add('is-valid'); //  일치할 때 초록색 체크 표시
                pwCheckFeedback.textContent = '';
            }
        }


        // 입력 이벤트 연결
        function attachLiveValidation() {
            Object.keys(validators).forEach(id => {
                const input = document.getElementById(id);
                if (input) {
                    input.addEventListener('input', () => validateField(input));
                }
            });

            const pwCheck = document.getElementById('userPasswordCheck');
            if (pwCheck) {
                pwCheck.addEventListener('input', validatePasswordMatch);
            }
        }



        function handleSignUp() {

            // 모든 필드 재검사 후 통과 시 서버 전송
            let isFormValid = true;
            Object.keys(validators).forEach(id => {
                const input = document.getElementById(id);
                validateField(input);
                if (input.classList.contains('is-invalid')) {
                    isFormValid = false;
                }
            });
            validatePasswordMatch();
            const pwCheck = document.getElementById('userPasswordCheck');
            if (pwCheck.classList.contains('is-invalid')) isFormValid = false;

            if (!isFormValid) return;

            // 값을 모으기
            const userLoginId = document.getElementById('userLoginId').value.trim();
            const userPassword = document.getElementById('userPassword').value.trim();
            const userPasswordCheck = document.getElementById('userPasswordCheck').value.trim();
            const userName = document.getElementById('userName').value.trim();
            const userEmail = document.getElementById('userEmail').value.trim();
            const userPhone = document.getElementById('userPhone').value.trim();
            const businessName = document.getElementById('businessName').value.trim();
            const businessRegistNum = document.getElementById('businessRegistNum').value.trim();
            const businessAddress = document.getElementById('businessAddress').value.trim();
            const businessPost = document.getElementById('businessPost').value.trim();

            // if (!userLoginId || !userPassword || !userPasswordCheck || !userName || !userEmail) {
            //     alert('필수 입력값을 모두 입력해주세요.');
            //     return;
            // }
            //
            // if (userPassword !== userPasswordCheck) {
            //     alert('비밀번호가 일치하지 않습니다.');
            //     return;
            // }

            const signUpData = {
                userLoginId,
                userPassword,
                userPasswordCheck,
                userName,
                userEmail,
                userPhone,
                businessName,
                businessRegistNum,
                businessAddress,
                businessPost
            };

            fetch('/nonuser/signup-submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(signUpData)
            })
                .then(response => {
                    if (response.ok) {
                        alert('회원가입이 완료되었습니다.');
                        window.location.href = '/nonuser/login';
                    } else {
                        return response.text().then(text => {
                            alert('회원가입 실패: ' + text);
                        });
                    }
                })
                .catch(error => {
                    console.error('오류 발생:', error);
                    alert('회원가입 중 오류가 발생했습니다.');
                });
        }


        document.addEventListener('DOMContentLoaded', function() {
            attachLiveValidation();
        });
    </script>

    <script th:inline="javascript">
        /*<![CDATA[*/
        // signupSuccess가 true면 모달을 띄운다
        if (/*[[${signupSuccess}]]*/ false) {
            const modalEl = document.getElementById('signupSuccessModal');
            const bsModal = new bootstrap.Modal(modalEl);
            bsModal.show();
        }
        /*]]>*/
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const failEl = document.getElementById('signupFailModal');
            var signupFailModal = new bootstrap.Modal(failEl);
            bootstrap.Modal.getOrCreateInstance(failEl).show();
        });

        function handleCloseFailModal() {
            const failEl = document.getElementById('signupFailModal');
            bootstrap.Modal.getOrCreateInstance(failEl).hide();
            // var signupFailModal = new bootstrap.Modal(failEl);
            // signupFailModal.hide();
            const backdrop = document.querySelector('.modal-backdrop');
            if (backdrop) backdrop.remove();
        }
    </script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <script>
        function execDaumPostcode() {
            new daum.Postcode({
                oncomplete: function(data) {
                    // 팝업에서 검색결과 항목을 클릭했을때 실행할 코드를 작성하는 부분.

                    // 도로명 주소의 노출 규칙에 따라 주소를 표시한다.
                    // 내려오는 변수가 값이 없는 경우엔 공백('')값을 가지므로, 이를 참고하여 분기 한다.
                    var businessAddr = data.roadAddress; // 도로명 주소 변수
                    var businessPost = data.zonecode;
                    // 우편번호와 주소 정보를 해당 필드에 넣는다.
                    document.getElementById("businessAddress").value = businessAddr;
                    document.getElementById("businessPost").value = businessPost;
                }
            }).open();
        }
    </script>
</main>
</body>
</html>
