<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layouts/layout-admin :: layout(~{::main})}">

<head>
    <title>회원 관리</title>
</head>

<body>

<main id="main" class="main">

    <div class="pagetitle">
        <h1>회원 관리</h1>
        <nav>
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="#">Home</a></li>
                <li class="breadcrumb-item active">회원관리</li>
            </ol>
        </nav>
    </div>

    <!-- 삭제 완료 모달 -->
    <div class="modal fade" id="deleteSuccessModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">삭제 완료</h5>
                </div>
                <div class="modal-body">
                    선택한 회원이 성공적으로 삭제되었습니다.
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                </div>
            </div>
        </div>
    </div>
    <!--    검색바 시작 -->
    <form class="search-form d-flex align-items-center mb-3" th:action="@{/admin/search}" method="get">
        <input type="text" name="name" class="form-control" placeholder="이름으로 검색" th:value="${param.name}">
        <button type="submit" class="btn btn-primary ms-2"><i class="bi bi-search"></i></button>
    </form>
    <!--    검색바 끝 -->
    <section class="section dashboard">
        <div class="row">
            <!--    사용자 목록 테이블 시작 -->
            <form th:action="@{/admin/delete}" method="post">
                <input type = "hidden" name = "selectedMembers"/>
                <table class="table table-bordered table-hover align-middle text-center">
                    <thead>
                    <tr>
                        <!-- 전체 선택 체크박스 -->
                        <th style="width: 50px;" class = "form-check-input" id="selectAll" onClick="toggleAll(this)"></th>
                        <th style="width: 80px;">번호</th>
                        <th>이름</th>
                        <th>계정 유형</th>
                        <!--대기, 승인 상태-->
                        <th>계정 상태</th>
                        <th>사업자번호</th>
                    </tr>
                    </thead>
                    <tbody>
                    <!--          각 tr마다 체크박스를 둔다-->
                    <tr th:each="user, iterStat : ${users}">
                        <td><input type="checkbox" name="selectedMembers" th:value="${user.id}" class="form-check-input" /></td>
                        <td th:text="${iterStat.index + 1}">번호</td>
                        <td th:text="${user.userName}">이름</td>
                        <!-- 회원 유형 -->
                        <td th:switch="${user.userType}">
                            <span th:case="'MEMBER'">일반 회원</span>
                            <span th:case="'ADMIN'">총관리자</span>
                            <span th:case="*">알 수 없음</span>
                        </td>

                        <!-- 계정 상태 -->
                        <td th:switch="${user.userStatus}">
                            <span th:case="'PENDING'">승인 대기 중</span>
                            <span th:case="'APPROVED'">승인 완료</span>
                            <span th:case="*">알 수 없음</span>
                        </td>
                        <td th:text="${user.businessRegistNum}">사업자번호</td>
                    </tr>
                    </tbody>
                    <!--일치하는 사용자 없을 시 nouserFoundMessage 가보내짐 - 있으면 출력 -->
                    <tr th:if="${NoUserFoundMessage != null}">
                        <td colspan="6" th:text="${NoUserFoundMessage}"></td>
                    </tr>
                </table>
                <!-- 선택된 회원 관리를 위한 버튼 추가 -->
<!--                <div class="d-flex justify-content-start mt-3 gap-3">-->
                    <button type="button" class="btn btn-primary" onclick="handleDetail()">상세</button>
                    <button type="button" class="btn btn-primary" onclick="handleApprove()" >승인</button>
                    <button type="button" class="btn btn-danger" onclick="handleDelete()">삭제</button>

<!--                </div>-->
            </form>
            <!--      폼의 끝부분에 모달 놔두기? -->
            <!-- ✅ 모달 -->
            <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog">

                    <div class="modal-content">

                    </div>

                </div>
            </div>
            <!--    테이블 끝부분-->
        </div>
    </section>
    <!--  페이지 넘버 시작 -->
    <nav>
        <ul class="pagination justify-content-center mt-4">
            <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/users(page=${currentPage - 1})}">이전</a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(1, totalPages)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:href="@{/admin/users(page=${i})}" th:text="${i}">1</a>
            </li>

            <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/users(page=${currentPage + 1})}">다음</a>
            </li>
        </ul>
    </nav>
    <!--  페이지 넘버 끝 -->

    <!--자바스크립트 시작 -->
    <script>
        // 선택된 회원 ID를 가져오는 함수
        function getSelectedMembers() {
            let selectedMembers = []; // 선택된 객체 아이디를 받아오기위한 배열
            let checkboxes = document.querySelectorAll('input[name = "selectedMembers"]:checked');

            checkboxes.forEach((cb) => {
                selectedMembers.push(cb.value); // cb(checkbox)하나의 value는 checked or unchekd
            });
            return selectedMembers; // 선택된 객체의 아이디 배열
        }

        // 상세 버튼 클릭 시

        function handleDetail() {
            const selectedMembers = getSelectedMembers();
            if (selectedMembers.length === 1) {
                const userId = selectedMembers[0];
                // userId를 쿼리 파라미터로 붙여 상세 페이지로 이동
                window.location.href = `/admin/detail?userId=${userId}`;
            } else {
                alert('상세 정보를 보려면 회원 한 명만 선택해야 합니다');
            }
        }


        // 승인 버튼 클릭 시
        function handleApprove() {
            let selectedMembers = getSelectedMembers();
            if (selectedMembers.length > 0) {
                if (confirm('선택된 회원을 승인하시겠습니까?')) {
                    // 선택된 회원 ID를 서버로 보내서 APPROVED 처리
                    fetch('/admin/APPROVED', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(selectedMembers) // id 담은 배열만 보내기 !!
                    })
                        .then(response => response.json())
                        .then(data => {
                            if (data.success) {
                                alert('회원이 승인되었습니다.');
                                window.location.reload(); // 삭제 후 페이지 새로고침
                            } else {
                                alert('승인 실패했습니다.');
                            }
                        });
                }
            } else {
                alert('회원이 선택되지 않았습니다.');
            }
        }


        // 삭제 버튼 클릭 시
        function handleDelete() {
            let selectedMembers = getSelectedMembers();
            if (selectedMembers.length > 0) {
                if (confirm('선택된 회원을 삭제하시겠습니까?')) {
                    // 선택된 회원 ID를 서버로 보내서 APPROVED 처리
                    fetch('/admin/delete', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(selectedMembers) // id 담은 배열만 보내기 !!
                    })
                        .then(response => response.json())
                        .then(data => {
                            if (data.success) {
                                alert('회원이 삭제되었습니다.');
                                window.location.reload(); // 삭제 후 페이지 새로고침
                            } else {
                                alert('삭제 실패했습니다.');
                            }
                        });
                }
            } else {
                alert('회원이 선택되지 않았습니다.');
            }
        }

        document.getElementById('selectAll').addEventListener('change', () => {
            const checked = this.checked;
            document.querySelectorAll('.form-check-input').forEach(box => box.checked = checked);
        })




    </script>
</main>
