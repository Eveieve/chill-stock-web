<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{member/layouts/layout-user :: layout(~{::main})}">
<body>
<main id="main" class="main">

    <div class="pagetitle">
        <h1>회원가입</h1>
        <nav>
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/">Home</a></li>
                <li class="breadcrumb-item active">회원가입</li>
            </ol>
        </nav>
    </div>

    <section class="section">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-body p-4">

                        <h5 class="card-title mb-4">회원 정보</h5>

                        <form th:action="@{/signup}" th:object="${signUpDTO}" method="post" class="needs-validation" novalidate>

                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">로그인 아이디</label>
                                <div class="col-sm-9">
                                    <input type="text" th:field="*{userLoginId}" class="form-control" placeholder="아이디를 입력하세요" required>
                                    <div class="text-danger small" th:if="${#fields.hasErrors('userLoginId')}" th:errors="*{userLoginId}"></div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">이름</label>
                                <div class="col-sm-9">
                                    <input type="text" th:field="*{userName}" class="form-control" placeholder="이름을 입력하세요" required>
                                    <div class="text-danger small" th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}"></div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">이메일</label>
                                <div class="col-sm-9">
                                    <input type="email" th:field="*{userEmail}" class="form-control" placeholder="example@email.com" required>
                                    <div class="text-danger small" th:if="${#fields.hasErrors('userEmail')}" th:errors="*{userEmail}"></div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">전화번호</label>
                                <div class="col-sm-9">
                                    <input type="text" th:field="*{userPhone}" class="form-control" placeholder="010-1234-5678" required>
                                    <div class="text-danger small" th:if="${#fields.hasErrors('userPhone')}" th:errors="*{userPhone}"></div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">비밀번호</label>
                                <div class="col-sm-9">
                                    <input type="password" th:field="*{userPassword}" class="form-control" placeholder="비밀번호를 입력하세요" required>
                                    <div class="text-danger small" th:if="${#fields.hasErrors('userPassword')}" th:errors="*{userPassword}"></div>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <label class="col-sm-3 col-form-label text-end">비밀번호 확인</label>
                                <div class="col-sm-9">
                                    <input type="password" th:field="*{userPasswordCheck}" class="form-control" placeholder="비밀번호를 다시 입력하세요" required>
                                    <div class="text-danger small" th:if="${#fields.hasErrors('userPasswordCheck')}" th:errors="*{userPasswordCheck}"></div>
                                </div>
                            </div>


                            <h5 class="card-title mb-4">사업체 정보</h5>

                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">사업체명</label>
                                <div class="col-sm-9">
                                    <input type="text" th:field="*{businessName}" class="form-control" placeholder="사업체명을 입력하세요" required>
                                    <div class="text-danger small" th:if="${#fields.hasErrors('businessName')}" th:errors="*{businessName}"></div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">사업자번호</label>
                                <div class="col-sm-9">
                                    <input type="text" th:field="*{businessRegistNum}" class="form-control" placeholder="000-00-00000" required>
                                    <div class="text-danger small" th:if="${#fields.hasErrors('businessRegistNum')}" th:errors="*{businessRegistNum}"></div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">사업장 주소</label>
                                <div class="col-sm-9">
                                    <input type="text" th:field="*{businessAddress}" class="form-control" placeholder="주소를 입력하세요" required>
                                    <div class="text-danger small" th:if="${#fields.hasErrors('businessAddress')}" th:errors="*{businessAddress}"></div>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <label class="col-sm-3 col-form-label text-end">우편번호</label>
                                <div class="col-sm-9">
                                    <input type="text" th:field="*{businessPost}" class="form-control" placeholder="우편번호를 입력하세요" required>
                                    <div class="text-danger small" th:if="${#fields.hasErrors('businessPost')}" th:errors="*{businessPost}"></div>
                                </div>
                            </div>

                            <div class="text-center">
                                <button type="submit" class="btn btn-primary w-50">가입하기</button>
                            </div>

                        </form>

                    </div>
                </div>
            </div>
        </div>
    </section>

</main>
</body>
</html>
