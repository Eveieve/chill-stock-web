<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layouts/layout-admin :: layout(~{::main})}">
<body>

<main id="main" class="main">

  <div class="pagetitle">
    <h1>회원 관리</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="#">Home</a></li>
        <li class="breadcrumb-item active">회원관리</li>
      </ol>
    </nav>
  </div>
<!--    검색바 시작 -->
    <form class="search-form d-flex align-items-center mb-3" th:action="@{/admin/search}" method="get">
        <input type="text" name="name" class="form-control" placeholder="이름으로 검색" th:value="${param.name}">
        <button type="submit" class="btn btn-primary ms-2"><i class="bi bi-search"></i></button>
    </form>
<!--    검색바 끝 -->
  <section class="section dashboard">
    <div class="row">
      <div class="row">
        <table class="table table-bordered table-hover align-middle text-center">
          <thead>
          <tr>
            <!--화면에서의 레코드 번호-->
            <th>번호</th>
            <th>이름</th>
            <th>계정 유형</th>
            <!--대기, 승인 상태-->
            <th>계정 상태</th>
            <th>사업자번호</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="user, iterStat : ${users}">
<!--            total은 컨트롤러에서 넘어온 전체 회원수, interStat은 iteration status variable, 반복문에 대한 상태정보 담음 -->
<!--            가장 최근에 등록된 회원이 번호가 제일 큼-->
            <td th:text="${iterStat.index + 1}">번호</td>
            <td th:text="${user.userName}">이름</td>
            <td th:text="${user.userType}">계정 유형</td>
            <td th:text="${user.userStatus}">계정 상태</td>
            <td th:text="${user.businessRegistNum}">사업자번호</td>
          </tr>
<!--일치하는 사용자 없을 시 nouserFounndMessage 가보내짐 - 있으면 출력 -->
          <tr th:if="${NoUserFoundMessage != null}">
              <td colspan="5" th:text="${NoUserFoundMessage}"></td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
<!--    테이블 끝부분-->
  </section>
<!--  페이지 넘버 시작 -->
  <nav>
    <ul class="pagination justify-content-center mt-4">
      <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
        <a class="page-link" th:href="@{/admin/users(page=${currentPage - 1})}">이전</a>
      </li>

      <li class="page-item"
          th:each="i : ${#numbers.sequence(1, totalPages)}"
          th:classappend="${i == currentPage} ? 'active'">
        <a class="page-link" th:href="@{/admin/users(page=${i})}" th:text="${i}">1</a>
      </li>

      <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
        <a class="page-link" th:href="@{/admin/users(page=${currentPage + 1})}">다음</a>
      </li>
    </ul>
  </nav>
<!--  페이지 넘버 끝 -->
</main>
</body>
</html>
