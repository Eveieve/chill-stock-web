<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layouts/layout-admin :: layout(~{::main})}">
<body>
<main id="main" class="main">

    <div class="pagetitle">
        <h1>메인보드</h1>
        <nav>
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="#">Home</a></li>
                <li class="breadcrumb-item active">메인관리</li>
            </ol>
        </nav>
    </div>

    <section class="section dashboard">

        <!-- 1행: 대기중인 입고요청, 대기중인 출고요청 -->
        <div class="row">
            <div class="col-lg-6">
                <div class="card info-card">
                    <div class="card-body">
                        <h5 class="card-title">대기중인 입고 요청</h5>
                        <div class="d-flex align-items-center">
                            <div class="card-icon bg-primary text-white rounded-circle d-flex align-items-center justify-content-center" style="width:40px; height:40px;">
                                <i class="bi bi-cart-plus"></i>
                            </div>
                            <div class="ps-3">
                                <h6 th:text="${inboundCount + '건'}">0건</h6>
                                <span class="text-muted small pt-2 ps-1">대기 중</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card info-card">
                    <div class="card-body">
                        <h5 class="card-title">대기중인 출고 요청</h5>
                        <div class="d-flex align-items-center">
                            <div class="card-icon bg-danger text-white rounded-circle d-flex align-items-center justify-content-center" style="width:40px; height:40px;">
                                <i class="bi bi-box-arrow-up"></i>
                            </div>
                            <div class="ps-3">
                                <h6 th:text="${outboundCount + '건'}">0건</h6>
                                <span class="text-muted small pt-2 ps-1">준비</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2행: 공지사항, 오늘 입출고 요청량 -->
        <div class="row">
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">공지사항</h5>
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item">
                                <strong>[시스템 점검]</strong> 5월 10일 01:00 ~ 03:00 서버 점검 예정입니다.
                            </li>
                            <li class="list-group-item">
                                <strong>[신규 기능]</strong> 출고 자동화 기능이 추가되었습니다.
                            </li>
                            <li class="list-group-item">
                                <strong>[공지]</strong> 창고 온도 관리 기능이 업데이트되었습니다.
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">오늘 입출고 요청량</h5>
                        <canvas id="todayInboundOutboundChart" style="min-height:250px;"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const ctx = document.getElementById('todayInboundOutboundChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['오늘 입고 요청', '오늘 출고 요청'],
                    datasets: [{
                        label: '요청 건수',
                        data: [
                            [[${inboundTodayCount}]],
                            [[${outboundTodayCount}]]
                        ],
                        backgroundColor: ['rgba(54, 162, 235, 0.7)', 'rgba(255, 99, 132, 0.7)'],
                        borderColor: ['rgba(54, 162, 235, 1)', 'rgba(255, 99, 132, 1)'],
                        borderWidth: 1
                    }]
                },
                options: {
                    indexAxis: 'y', // 💡 가로 막대그래프로 변경하는 핵심
                    scales: {
                        x: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1
                            }
                        }
                    }
                }
            });
        });
    </script>
</main>


</body>
</html>
