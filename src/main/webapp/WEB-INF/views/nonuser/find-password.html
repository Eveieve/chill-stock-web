<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>비밀번호 찾기</title>
    <meta charset="UTF-8">
</head>
<body>

<!-- STEP 1: 아이디 입력 -->
<div id="step-loginId" th:if="${modalStep == null or modalStep == 'loginId'}">
    <form id="findIdForm" th:action="@{/find-password}" method="post">
        <label>로그인 아이디</label>
        <input type="text" name="userLoginId" th:value="${passwordResetDTO?.userLoginId}" required />
        <button type="submit">다음</button>
        <p th:if="${errorMessage}" th:text="${errorMessage}"></p>
    </form>
</div>

<!-- STEP 2: 비밀번호 재설정 -->
<div id="step-password" th:if="${modalStep == 'password'}">
    <form id="resetPwForm" th:action="@{/find-password}" method="post">
        <input type="hidden" name="userLoginId" th:value="${passwordResetDTO?.userLoginId}" />
        <label>새 비밀번호</label>
        <input type="password" name="newPassword" required />
        <label>비밀번호 확인</label>
        <input type="password" name="newPasswordCheck" required />
        <button type="submit">비밀번호 변경</button>
        <p th:if="${errorMessage}" th:text="${errorMessage}"></p>
    </form>
</div>

<!-- STEP 3: 성공 모달 -->
<div id="step-success" th:if="${modalStep == 'success'}">
    <p>비밀번호가 성공적으로 변경되었습니다.</p>
    <form th:action="@{/nonuser/login}" method="get">
        <button type="submit">로그인 하러 가기</button>
    </form>
</div>

</body>
</html>
