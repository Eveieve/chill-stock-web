# Thymeleaf
spring.thymeleaf.prefix=file:src/main/webapp/WEB-INF/views/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true
spring.thymeleaf.mode=HTML

# Database
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/chillstockDB?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
spring.datasource.username=chillstock
spring.datasource.password=chillstock1234

# MyBatis
mybatis.mapper-locations=classpath:/mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

# Redis
spring.redis.host=localhost
spring.redis.port=6379

# Static Resources
spring.web.resources.static-locations=classpath:/static/,file:src/main/webapp/static/
spring.mvc.static-path-pattern=/static/**

# Server
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
