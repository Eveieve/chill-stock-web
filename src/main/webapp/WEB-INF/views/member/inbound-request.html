<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{member/layouts/layout-user :: layout(~{::main})}">
<body>

<main id="main" class="main">
    <!-- Success message alert (disappears after 3 seconds) -->
    <div id="successAlert" class="alert alert-success fade show text-center mt-3" th:if="${successMessage}">
        <span th:text="${successMessage}">Inbound request completed successfully.</span>
    </div>

    <div class="pagetitle">
        <h1>Inbound Request</h1>
        <nav>
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="#">Home</a></li>
                <li class="breadcrumb-item active">Inbound Request</li>
            </ol>
        </nav>
    </div>

    <section class="section">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Registered Products</h5>


                <form th:action="@{/member/inbound-request}" method="post">

                    <!-- ✅ Table -->
                    <table class="table table-bordered text-center align-middle">
                        <thead>
                        <tr>
                            <th>Product Name</th>
                            <th>Size (m²)</th>
                            <th>Storage Temperature (℃)</th>
                            <th>Expiration Date</th>
                            <th>Select</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="product : ${myProducts}">
                            <td th:text="${product.productName}">Product Name</td>
                            <td th:text="${product.productSize}">2</td>
                            <td th:text="${product.storageTemperature}">10</td>
                            <td th:text="${#temporals.format(product.expirationDate, 'yyyy-MM-dd')}"></td>
                            <td>
                                <input type="radio" name="productId" th:value="${product.productId}" required>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                    <div class="d-flex justify-content-end">
                        <label for="amount" class="me-2 align-self-center">Enter Quantity:</label>
                        <input type="number" id="amount" name="amount" class="form-control w-auto me-2" min="1" required>
                        <button type="submit" class="btn btn-primary">Submit Request</button>
                    </div>

                </form>
                <!-- ✅ End of form -->

                <!-- ✅ Pagination -->
                <nav>
                    <ul class="pagination justify-content-center mt-4">
                        <!-- Previous button -->
                        <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/member/inbound-request(page=${currentPage - 1})}">Previous</a>
                        </li>

                        <!-- Page number iteration -->
                        <li class="page-item"
                            th:each="i : ${#numbers.sequence(1, totalPages)}"
                            th:classappend="${i == currentPage} ? 'active'">
                            <a class="page-link" th:href="@{/member/inbound-request(page=${i})}" th:text="${i}">1</a>
                        </li>

                        <!-- Next button -->
                        <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                            <a class="page-link" th:href="@{/member/inbound-request(page=${currentPage + 1})}">Next</a>
                        </li>
                    </ul>
                </nav>

            </div>
        </div>
    </section>

    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
            const alert = document.getElementById("successAlert");
            if (alert) {
                setTimeout(function () {
                    alert.classList.remove("show"); // Start transition
                    setTimeout(() => alert.remove(), 500); // Complete removal after gradually fading
                }, 3000); // Start after 3 seconds
            }
        });
    </script>

</main>
</body>
</html>
