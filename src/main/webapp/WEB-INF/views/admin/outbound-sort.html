<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layouts/layout-admin :: layout(~{::main})}">
<!-- Bootstrap 5.3 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<body>
<main id="main" class="main">

  <div class="pagetitle">
    <h1>м¶ңкі кҙҖлҰ¬</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="#">Home</a></li>
        <li class="breadcrumb-item active">м¶ңкі кҙҖлҰ¬</li>
      </ol>
    </nav>
  </div>

  <section class="section dashboard">
    <div class="row">
      <!-- мғҒнғңлі„ мЎ°нҡҢ -->
      <form th:action="@{/admin/outbound/sort}" method="get">
        <div class="input-group mb-3" style="max-width: 300px;">
          <select class="form-select" name="status" onchange="this.form.submit()">
            <option value="">м„ нғқ</option>
            <option value="">м „мІҙ</option>
            <option value="лҢҖкё°">лҢҖкё°</option>
            <option value="мҠ№мқё">мҠ№мқё</option>
            <option value="л°ҳл Ө">л°ҳл Ө</option>
          </select>
        </div>
      </form>

      <!-- мҠ№мқё/л°ҳл Ө кіөнҶө нҸј (мҠ№мқё мӢң м ңм¶ң) -->
      <form id="outboundForm" method="post" th:action="@{/admin/outbound/sort}">
        <table class="table table-bordered table-hover align-middle text-center">
          <thead class="table-light">
          <tr>
            <th>м¶ңкі  ID</th>
            <th>м¶ңкі мқј</th>
            <th>м¶ңкі  мҡ”мІӯмқј</th>
            <th>м¶ңкі  мғҒнғң</th>
            <th>м¶ңкі  мҲҳлҹү</th>
            <th>мһ¬кі  мҲҳлҹү</th>
            <th>м ңн’ҲлӘ…</th>
            <th>л°ҳл Ө мӮ¬мң </th>
            <th>м„ нғқ</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="outbound : ${outboundList}">
            <td th:text="${outbound.outbound_id}"></td>
            <td th:text="${outbound.outbound_date}"></td>
            <td th:text="${outbound.outbound_request_date}"></td>
            <td th:text="${outbound.outbound_status}"
                th:classappend="|
                             ${outbound.outbound_status == 'лҢҖкё°' ? 'text-warning' : ''}
                             ${outbound.outbound_status == 'мҠ№мқё' ? 'text-success' : ''}
                             ${outbound.outbound_status == 'л°ҳл Ө' ? 'text-danger' : ''}
                                |">
            </td>
            <td th:text="${outbound.outbound_amount}"></td>
            <td th:text="${outbound.stock_amount}"></td>
            <td th:text="${outbound.product_name}"></td>
            <td th:text="${outbound.reject_reason_message}"></td>
            <td>
              <!-- лқјл””мҳӨлІ„нҠј nameмқҖ outboundId -->
              <input type="radio"
                     class="stock-radio"
                     name="outboundId"
                     th:value="${outbound.outbound_id}"
                     th:disabled="${outbound.outbound_status == 'мҠ№мқё' or outbound.outbound_status == 'л°ҳл Ө'}"
                     required/>
            </td>
          </tr>
          </tbody>
        </table>

        <div class="d-flex justify-content-end align-items-center gap-2 mt-3">
          <!-- мҠ№мқё лІ„нҠј: мқҙ нҸј(submit)м—җ newStatus=мҠ№мқё м¶”к°Җ -->
          <button type="submit"
                  class="btn btn-primary"
                  name="newStatus"
                  value="мҠ№мқё">мҠ№мқё</button>

          <!-- л°ҳл Ө лІ„нҠј: лӘЁлӢ¬ нҠёлҰ¬кұ° (JSлЎң лӘЁлӢ¬ мҳӨн”Ҳ) -->
          <button type="button"
                  id="OutboundReject"
                  class="btn btn-danger">
            л°ҳл Ө
          </button>
        </div>
      </form>

      <!-- нҺҳмқҙм§•(nav) -->
      <nav>
        <ul class="pagination justify-content-center mt-4">
          <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
            <a class="page-link"
               th:href="@{/admin/outbound/sort(status=${status}, page=${currentPage - 1})}">мқҙм „</a>
          </li>

          <th:block th:with="startPage=${((currentPage - 1) / 10) * 10 + 1},
                              endPage=${(startPage + 9) > totalPages ? totalPages : (startPage + 9)}">
            <li class="page-item"
                th:each="i : ${#numbers.sequence(startPage, endPage)}"
                th:classappend="${i == currentPage} ? 'active'">
              <a class="page-link"
                 th:href="@{/admin/outbound/sort(status=${status}, page=${i})}"
                 th:text="${i}"></a>
            </li>
          </th:block>

          <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
            <a class="page-link"
               th:href="@{/admin/outbound/sort(status=${status}, page=${currentPage + 1})}">лӢӨмқҢ</a>
          </li>
        </ul>
      </nav>
    </div>
  </section>

  <!-- л°ҳл Ө лӘЁлӢ¬ -->
  <div class="modal fade" id="rejectModal" tabindex="-1"
       aria-labelledby="rejectModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <form id="rejectForm"
              method="post"
              th:action="@{/admin/outbound/sort}">
          <div class="modal-header">
            <h5 class="modal-title" id="rejectModalLabel">л°ҳл Ө мӮ¬мң  м„ нғқ</h5>
            <button type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                    aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <select name="rejectCode" class="form-select" required>
              <option value="">м„ нғқ</option>
              <option th:each="code : ${rejectCodes}"
                      th:value="${code.code}"
                      th:text="${code.code + ' : ' +code.msg}"></option>
            </select>
            <!-- м„ нғқлҗң ID м „лӢ¬ -->
            <input type="hidden" name="outboundId" id="rejectOutboundId"/>
            <!-- мғҒнғң м „лӢ¬ -->
            <input type="hidden" name="newStatus" value="л°ҳл Ө"/>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-danger">нҷ•мқё</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("OutboundReject").addEventListener("click", function (e) {
        e.preventDefault();
        const selectedRadio = document.querySelector('input[name="outboundId"]:checked');
        if (!selectedRadio) {
          alert("м¶ңкі лҘј м„ нғқн•ҳм„ёмҡ”.");
          return;
        }
        document.getElementById("rejectOutboundId").value = selectedRadio.value;
        new bootstrap.Modal(document.getElementById("rejectModal")).show();
      });
    });
  </script>
</main>
</body>
</html>
