<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layouts/layout-admin :: layout(~{::main})}">

<body>
<main id="main" class="main">

    <div class="pagetitle">
        <h1>회원 상세 정보</h1>
        <nav>
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="#">Home</a></li>
                <li class="breadcrumb-item"><a href="/admin/users">회원관리</a></li>
                <li class="breadcrumb-item active">상세정보</li>
            </ol>
        </nav>
    </div>

    <section class="section profile">
        <div class="row">
            <div class="col-xl-8">

                <div class="card">
                    <div class="card-body pt-3">
                        <!-- Profile Overview Tab -->
                        <div class="tab-pane fade show active profile-overview" id="profile-overview">

                            <h5 class="card-title">회원 정보</h5>

                            <div class="row">
                                <div class="col-lg-3 col-md-4 label">아이디</div>
                                <div class="col-lg-9 col-md-8" th:text="${user.userLoginId}">login_id</div>
                            </div>

                            <div class="row">
                                <div class="col-lg-3 col-md-4 label">이름</div>
                                <div class="col-lg-9 col-md-8" th:text="${user.userName}">홍길동</div>
                            </div>

                            <div class="row">
                                <div class="col-lg-3 col-md-4 label">이메일</div>
                                <div class="col-lg-9 col-md-8" th:text="${user.userEmail}">example@email.com</div>
                            </div>

                            <div class="row">
                                <div class="col-lg-3 col-md-4 label">전화번호</div>
                                <div class="col-lg-9 col-md-8" th:text="${user.userPhone}">010-1234-5678</div>
                            </div>

                        <div class="row">
                            <div class="col-lg-3 col-md-4 label">회원유형</div>
                            <div class="col-lg-9 col-md-8" th:switch="${user.userType}">
                                <span th:case="'ROLE_member'" class="col-lg-9 col-md-8">일반 회원</span>
                                <span th:case="'ROLE_admin'" class="col-lg-9 col-md-8">총관리자</span>
                                <span th:case="*">알 수 없음</span>
                            </div>
                        </div>

                            <div class="row mb-4">
                                <div class="col-lg-3 col-md-4 label">계정 상태</div>
                                <div class="col-lg-9 col-md-8" th:switch="${user.userStatus}">
                                    <span th:case="'pending'" class="col-lg-9 col-md-8">승인 대기 중</span>
                                    <span th:case="'approve'" class="col-lg-9 col-md-8">승인 완료</span>
                                    <span th:case="*" class="col-lg-9 col-md-8">알 수 없음</span>
                                </div>

                            <div class="row mt-3 mb-4">
                                <div class="col-lg-3 col-md-4 label">승인 요청일</div>
                                <div class="col-lg-9 col-md-8" th:text="${user.userRequestedAt}">2024-04-23</div>
                            </div>

                            <div class="row">
                                <div class="col-lg-3 col-md-4 label">계정 승인일</div>
                                <div class="col-lg-9 col-md-8" th:text="${user.userApprovedAt != null} ? ${user.userApprovedAt} : '미승인'">2024-04-24</div>
                            </div>

                            <h5 class="card-title ps-sm-2">사업체 정보</h5>

                            <div class="row">
                                <div class="col-lg-3 col-md-4 label">사업체명</div>
                                <div class="col-lg-9 col-md-8" th:text="${user.businessName}">ABC Corp</div>
                            </div>

                            <div class="row">
                                <div class="col-lg-3 col-md-4 label">사업자번호</div>
                                <div class="col-lg-9 col-md-8" th:text="${user.businessRegistNum}">123-45-67890</div>
                            </div>

                            <div class="row">
                                <div class="col-lg-3 col-md-4 label">사업장 주소</div>
                                <div class="col-lg-9 col-md-8" th:text="${user.businessAddress}">서울특별시 강남구 테헤란로</div>
                            </div>

                            <div class="row">
                                <div class="col-lg-3 col-md-4 label">우편번호</div>
                                <div class="col-lg-9 col-md-8" th:text="${user.businessPost}">06236</div>
                            </div>

                        </div>
                    </div>
                </div>

            </div>
        </div>
        </div>
    </section>

</main>
</body>
</html>
