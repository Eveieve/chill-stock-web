<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layouts/layout-admin :: layout(~{::main})}">
<body>

<main id="main" class="main">

  <div class="pagetitle">
    <h1>회원 관리</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="#">Home</a></li>
        <li class="breadcrumb-item active">회원관리</li>
      </ol>
    </nav>
  </div>
  <!--    검색바 시작 -->
  <form class="search-form d-flex align-items-center mb-3" th:action="@{/admin/search}" method="get">
    <input type="text" name="name" class="form-control" placeholder="이름으로 검색" th:value="${param.name}">
    <button type="submit" class="btn btn-primary ms-2"><i class="bi bi-search"></i></button>
  </form>
  <!--    검색바 끝 -->
  <section class="section dashboard">
    <div class="row">
      <!--    사용자 목록 테이블 시작 -->
      <form th:action="@{/admin/users}" method="post">
        <table class="table table-bordered table-hover align-middle text-center">
          <thead>
          <tr>
            <!-- 전체 선택 체크박스 -->
            <th style="width: 50px;">
              <input type="checkbox" id="selectAllCheckboxes" class="form-check-input" />
            </th>
            <!--화면에서의 레코드 번호-->
            <th style="width: 80px;">번호</th>
            <th>이름</th>
            <th>계정 유형</th>
            <!--대기, 승인 상태-->
            <th>계정 상태</th>
            <th>사업자번호</th>
          </tr>
          </thead>
          <tbody>
          <!--          userId를 data attribute로 숨겨서 넣어두기 -->
          <tr th:if="${users != null and not #lists.isEmpty(users)}" th:each="user, iterStat : ${users}">
            <td>
              <input type="checkbox" name="selectedUserIds" th:value="${user.id}" class="form-check-input" />
            </td>
            <td th:text="${iterStat.index + 1}">번호</td>
            <td th:text="${user.userName}">이름</td>
            <td th:text="${user.userType}">계정 유형</td>
            <td th:text="${user.userStatus}">계정 상태</td>
            <td th:text="${user.businessRegistNum}">사업자번호</td>
          </tr>
          <!--일치하는 사용자 없을 시 nouserFounndMessage 가보내짐 - 있으면 출력 -->
          <tr th:if="${users == null or #lists.isEmpty(users)}">
            <td colspan="6" class="text-center" th:text="${NoUserFoundMessage != null ? NoUserFoundMessage : '등록된 회원이 없습니다.'}">
              데이터가 없습니다.
            </td>
          </tr>
          </tbody>
        </table>
        <!-- 선택된 회원 관리를 위한 버튼 그룹 추가 -->
        <div class="text-end mt-3">
          <button type="submit" class="btn btn-primary">선택 완료</button>
        </div>
      </form>
      <!--    테이블 끝부분-->
    </div>
  </section>
  <!--  페이지 넘버 시작 -->
  <nav>
    <ul class="pagination justify-content-center mt-4">
      <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
        <a class="page-link" th:href="@{/admin/users(page=${currentPage - 1})}">이전</a>
      </li>

      <li class="page-item"
          th:each="i : ${#numbers.sequence(1, totalPages)}"
          th:classappend="${i == currentPage} ? 'active'">
        <a class="page-link" th:href="@{/admin/users(page=${i})}" th:text="${i}">1</a>
      </li>

      <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
        <a class="page-link" th:href="@{/admin/users(page=${currentPage + 1})}">다음</a>
      </li>
    </ul>
  </nav>
  <!--  페이지 넘버 끝 -->
</main>

<!--자바스크립트 시작 -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const selectAllCheckbox = document.getElementById("selectAllCheckboxes");
    const userCheckboxes = document.querySelectorAll('input[name="selectedUserIds"]');

    if (selectAllCheckbox) {
      selectAllCheckbox.addEventListener('change', function () {
        userCheckboxes.forEach(cb => cb.checked = this.checked);
      });
    }

    // 개별 체크박스 상태에 따라 전체 선택 체크박스 상태 업데이트
    userCheckboxes.forEach(checkbox => {
      checkbox.addEventListener('change', function() {
        const allChecked = Array.from(userCheckboxes).every(cb => cb.checked);
        const someChecked = Array.from(userCheckboxes).some(cb => cb.checked);
        selectAllCheckbox.checked = allChecked;
        selectAllCheckbox.indeterminate = someChecked && !allChecked;
      });
    });
  });
</script>
</body>



</html>
