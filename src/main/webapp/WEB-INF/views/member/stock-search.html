<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{member/layouts/layout-user :: layout(~{::main})}">
<body>

<main id="main" class="main">
    <div class="pagetitle">
        <h1>Dashboard</h1>
        <nav>
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="#">Home</a></li>
                <li class="breadcrumb-item active">Stock Status</li>
            </ol>
        </nav>
    </div>

    <section class="section dashboard">
        <div class="row">
            <h1>Stock List</h1>
            <form th:action="@{/member/stock/search}" method="get">
                <div class="input-group mb-3" style="max-width: 300px;">
                    <input type="text" class="form-control" name="productName" placeholder="Search product name" th:value="${productName}">
                    <button class="btn btn-primary" type="submit">Search</button>
                </div>
            </form>
            <form>
                <table border="1" class="table table-bordered table-hover align-middle text-center">
                    <thead class="table-light">
                    <tr>
                        <th>Stock ID</th>
                        <th>Product ID</th>
                        <th>Product Name</th>
                        <th>Expiration Date</th>
                        <th>Stock Quantity</th>
                        <th>Inbound Date</th>
                    </tr>
                    </thead>
                    <tr th:if="${#lists.isEmpty(stockList)}">
                        <td colspan="7">No results found.</td>
                    </tr>
                    <tbody>
                    <tr th:each="stock : ${stockList}">
                        <td th:text="${stock.stock_id}"></td>
                        <td th:text="${stock.product_id}"></td>
                        <td th:text="${stock.product_name}"></td>
                        <td th:text="${#dates.format(stock.expiration_date, 'yyyy-MM-dd')}"></td>
                        <td th:text="${stock.stock_amount}"></td>
                        <td th:text="${stock.inbound_date}"></td>
                    </tr>
                    </tbody>
                </table>
            </form>
            <nav th:if="${totalPages > 0}">
                <ul class="pagination justify-content-center mt-4">
                    <!-- Previous button -->
                    <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/member/stock/search(productName=${productName}, page=${currentPage - 1})}">Previous</a>
                    </li>

                    <!-- Page numbers -->
                    <th:block th:with="startPage=${((currentPage - 1) / 10) * 10 + 1}, 
                           endPage=${(startPage + 9) > totalPages ? totalPages : (startPage + 9)}">
                        <li class="page-item" th:each="i : ${#numbers.sequence(startPage, endPage)}"
                            th:classappend="${i == currentPage} ? 'active'">
                            <a class="page-link" th:href="@{/member/stock/search(productName=${productName}, page=${i})}" th:text="${i}"></a>
                        </li>
                    </th:block>

                    <!-- Next button -->
                    <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                        <a class="page-link" th:href="@{/member/stock/search(productName=${productName}, page=${currentPage + 1})}">Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    </section>

</main>
</body>
</html>
