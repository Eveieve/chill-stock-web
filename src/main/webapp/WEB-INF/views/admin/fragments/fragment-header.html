<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- ======= Header ======= -->
<header id="header" class="header fixed-top d-flex align-items-center" th:fragment="header">

    <div class="d-flex align-items-center justify-content-between">
        <a href="#" class="logo d-flex align-items-center" th:href="@{/admin}">
            <img src="assets/img/logo.png" alt="ChillStock Logo" th:src="@{/static/assets/img/logo.png}">
            <span class="d-none d-lg-block">ChillStock</span> <!-- 수정된 부분 -->
        </a>
        <i class="bi bi-list toggle-sidebar-btn"></i>
    </div><!-- End Logo -->

    <nav class="header-nav ms-auto">
        <ul class="d-flex align-items-center">

            <li class="nav-item dropdown pe-3">

                <a class="nav-link nav-profile d-flex align-items-center pe-0" href="#" data-bs-toggle="dropdown">
                    <img src="assets/img/profile-img.jpg" alt="관리자 프로필" class="rounded-circle" th:src="@{/static/assets/img/profile-img.jpg}">
                    <span class="d-none d-md-block dropdown-toggle ps-2">관리자</span> <!-- 수정된 부분 -->
                </a>

                <ul class="dropdown-menu dropdown-menu-end dropdown-menu-arrow profile">
                    <li class="dropdown-header">
                        <h6>관리자</h6> <!-- 수정된 부분 -->
                        <span>Warehouse Admin</span> <!-- 직책도 수정 -->
                    </li>
                    <li>
                        <hr class="dropdown-divider">
                    </li>

                    <li>
                        <form action="/logout" method="POST" style="margin: 0;">
                            <button type="submit" class="dropdown-item d-flex align-items-center" style="background: none; border: none; width: 100%;">
                                <i class="bi bi-box-arrow-right"></i>
                                <span>Sign Out</span>
                            </button>
                        </form>
                    </li>

                </ul><!-- End Profile Dropdown Items -->
            </li><!-- End Profile Nav -->

        </ul>
    </nav><!-- End Icons Navigation -->

</header><!-- End Header -->
</body>
</html>
