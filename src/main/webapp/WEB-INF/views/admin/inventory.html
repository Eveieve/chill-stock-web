<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layouts/layout-admin :: layout(~{::main})}">
<body>

<main id="main" class="main">

  <div class="pagetitle">
    <h1>입출고 이력</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="#">Home</a></li>
        <li class="breadcrumb-item active">입출고 이력</li>
      </ol>
    </nav>
  </div>

  <section class="section">

    <!-- 테이블 fragment: 이 부분만 AJAX로 갱신됨 -->
    <div id="tableArea" th:fragment="listFragment">
      <table class="table table-hover">
        <thead>
        <tr>
          <th>제품명</th>
          <th>입출고 유형</th>
          <th>수량</th>
          <th>현재 재고</th>
          <th>창고명</th>
          <th>구역</th>
          <th>처리일시</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="history : ${historyList}">
          <td th:text="${history.productName}"></td>
          <td th:text="${history.type}"></td>
          <td th:text="${history.amount}"></td>
          <td th:text="${history.currentStock}"></td>
          <td th:text="${history.warehouseName}"></td>
          <td th:text="${history.areaCode}"></td>
          <td th:text="${#temporals.format(history.handledAt, 'yyyy-MM-dd HH:mm')}"></td>
        </tr>
        </tbody>
      </table>
    </div>

    <!--  페이지네이션: 테이블 밖에서 렌더링되며 AJAX 영향 없음 -->
    <div th:if="${currentPage != null}">
      <nav>
        <ul class="pagination justify-content-center mt-4">
          <!-- 이전 버튼 -->
          <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
            <a class="page-link" th:href="@{/admin/inventory(page=${currentPage - 1})}">이전</a>
          </li>

          <!-- 페이지 번호 반복 -->
          <li class="page-item"
              th:each="i : ${#numbers.sequence(1, totalPages)}"
              th:classappend="${i == currentPage} ? 'active'">
            <a class="page-link" th:href="@{/admin/inventory(page=${i})}" th:text="${i}">1</a>
          </li>

          <!-- 다음 버튼 -->
          <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
            <a class="page-link" th:href="@{/admin/inventory(page=${currentPage + 1})}">다음</a>
          </li>
        </ul>
      </nav>
    </div>

  </section>

  <!-- 자동 갱신 JS는 1페이지일 때만 실행 -->
  <script>
    const currentPage = /*[[${currentPage}]]*/ 1;

    if (currentPage === 1) {
      setInterval(() => {
        fetch('/admin/inventory/fragment?page=1') // 최신순 페이지로 고정 요청
                .then(response => response.text())
                .then(html => {
                  document.getElementById('tableArea').innerHTML = html;
                })
                .catch(err => console.error("이력 갱신 실패", err));
      }, 5000);
    }
  </script>

</main>
</body>
</html>
