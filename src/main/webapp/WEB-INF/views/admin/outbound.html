<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layouts/layout-admin :: layout(~{::main})}">
<!-- Bootstrap 5.3 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<body>
<main id="main" class="main">

  <div class="pagetitle">

    <div id="outboundAlert" class="alert alert-success fade show text-center mt-3" th:if="${message}">
      <span th:text="${message}"></span>
    </div>

    <div id="outboundAlert1" class="alert alert-warning fade show text-center mt-3" th:if="${failMessage}">
      <span th:text="${failMessage}"></span>
    </div>

    <script>
      setTimeout(function() {
        var alert = document.getElementById('outboundAlert');
        var alert1 = document.getElementById('outboundAlert1');
        if (alert) {
          var bsAlert = new bootstrap.Alert(alert);
          bsAlert.close();
        }
        if (alert1) {
          var bsAlert1 = new bootstrap.Alert(alert1);
          bsAlert1.close();
        }
      }, 2000);
    </script>

    <h1>Outbound Management</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="#">Home</a></li>
        <li class="breadcrumb-item active">Outbound Management</li>
      </ol>
    </nav>
  </div>

  <section class="section dashboard">
    <div class="row">
      <!-- Status filter -->
      <form th:action="@{/admin/outbound/sort}" method="get">
        <div class="input-group mb-3" style="max-width: 300px;">
          <select class="form-select" name="status" onchange="this.form.submit()">
            <option value="">Select</option>
            <option value="">All</option>
            <option value="대기">Pending</option>
            <option value="승인">Approved</option>
            <option value="반려">Rejected</option>
          </select>
        </div>
      </form>

      <!-- Approval/Rejection common form -->
      <form id="outboundForm" method="post" th:action="@{/admin/outbound}">
        <table class="table table-bordered table-hover align-middle text-center">
          <thead class="table-light">
          <tr>
            <th>Outbound ID</th>
            <th>Outbound Date</th>
            <th>Request Date</th>
            <th>Status</th>
            <th>Requested Quantity</th>
            <th>Stock Quantity</th>
            <th>Product Name</th>
            <th>Rejection Reason</th>
            <th>Select</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="outbound : ${outboundList}">
            <td th:text="${outbound.outbound_id}"></td>
            <td th:text="${outbound.outbound_date}"></td>
            <td th:text="${outbound.outbound_request_date}"></td>
            <td th:text="${outbound.outbound_status}"
                th:classappend="|
                             ${outbound.outbound_status == '대기' ? 'text-warning' : ''}
                             ${outbound.outbound_status == '승인' ? 'text-success' : ''}
                             ${outbound.outbound_status == '반려' ? 'text-danger' : ''}
                                |">
            </td>
            <td th:text="${outbound.outbound_amount}"></td>
            <td th:text="${outbound.stock_amount}"></td>
            <td th:text="${outbound.product_name}"></td>
            <td th:text="${outbound.reject_reason_message}"></td>
            <td>
              <!-- Radio button name is outboundId -->
              <input type="radio"
                     class="stock-radio"
                     name="outboundId"
                     th:value="${outbound.outbound_id}"
                     th:disabled="${outbound.outbound_status == '승인' or outbound.outbound_status == '반려'}"
                     required/>
            </td>
          </tr>
          </tbody>
        </table>

        <div class="d-flex justify-content-end align-items-center gap-2 mt-3">
          <!-- Approve button -->
          <button type="submit"
                  class="btn btn-primary"
                  name="newStatus"
                  value="승인">Approve</button>

          <!-- Reject button: Modal trigger -->
          <button type="button"
                  id="OutboundReject"
                  class="btn btn-danger">
            Reject
          </button>
        </div>
      </form>

      <!-- Pagination -->
      <nav th:if="${totalPages > 0}">
        <ul class="pagination justify-content-center mt-4">
          <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
            <a class="page-link"
               th:href="@{/admin/outbound(page=${currentPage - 1})}">Previous</a>
          </li>

          <th:block th:with="startPage=${((currentPage - 1) / 10) * 10 + 1},
                              endPage=${(startPage + 9) > totalPages ? totalPages : (startPage + 9)}">
            <li class="page-item"
                th:each="i : ${#numbers.sequence(startPage, endPage)}"
                th:classappend="${i == currentPage} ? 'active'">
              <a class="page-link"
                 th:href="@{/admin/outbound(page=${i})}"
                 th:text="${i}"></a>
            </li>
          </th:block>

          <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
            <a class="page-link"
               th:href="@{/admin/outbound(page=${currentPage + 1})}">Next</a>
          </li>
        </ul>
      </nav>
    </div>
  </section>

  <!-- Rejection modal -->
  <div class="modal fade" id="rejectModal" tabindex="-1"
       aria-labelledby="rejectModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <form id="rejectForm"
              method="post"
              th:action="@{/admin/outbound}">
          <div class="modal-header">
            <h5 class="modal-title" id="rejectModalLabel">Select Rejection Reason</h5>
            <button type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"
                    aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <select name="rejectCode" class="form-select" required>
              <option value="">Select</option>
              <option th:each="code : ${rejectCodes}"
                      th:value="${code.code}"
                      th:text="${code.code + ' : ' +code.msg}"></option>
            </select>
            <!-- Pass selected ID -->
            <input type="hidden" name="outboundId" id="rejectOutboundId"/>
            <!-- Pass status -->
            <input type="hidden" name="newStatus" value="반려"/>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-danger">Confirm</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("OutboundReject").addEventListener("click", function (e) {
        e.preventDefault();
        const selectedRadio = document.querySelector('input[name="outboundId"]:checked');
        if (!selectedRadio) {
          alert("Please select an outbound request.");
          return;
        }
        document.getElementById("rejectOutboundId").value = selectedRadio.value;
        new bootstrap.Modal(document.getElementById("rejectModal")).show();
      });
    });
  </script>
</main>
</body>
</html>
