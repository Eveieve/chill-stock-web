<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{member/layouts/layout-user :: layout(~{::main})}">
<body>
<main id="main" class="main">

    <div class="pagetitle">
        <h1>회원가입</h1>
        <nav>
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/">Home</a></li>
                <li class="breadcrumb-item active">회원가입</li>
            </ol>
        </nav>
    </div>

    <section class="section">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-body p-4">

                        <h5 class="card-title mb-4">회원 정보</h5>

                        <form id="signUpForm" method="post" class="needs-validation" novalidate>

                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">로그인 아이디</label>
                                <div class="col-sm-9">
                                    <input type="text" id="userLoginId" name="userLoginId" class="form-control" placeholder="아이디를 입력하세요" required>
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">이름</label>
                                <div class="col-sm-9">
                                    <input type="text" id="userName" name="userName" class="form-control" placeholder="이름을 입력하세요" required>
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>

                            <div class="row mb-3 align-items-center">
                                <label class="col-sm-3 col-form-label text-end">이메일</label>
                                <div class="col-sm-6">
                                    <input type="email" id="userEmail" name="userEmail" class="form-control" placeholder="example@email.com" required>
                                    <div class="invalid-feedback"></div>
                                </div>
                                <div class="col-sm-3">
                                    <button type="button" class="btn btn-outline-primary w-100" id="checkEmailDuplication">중복 확인</button>
                                </div>
                            </div>


                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">전화번호</label>
                                <div class="col-sm-9">
                                    <input type="text" id="userPhone" name="userPhone" class="form-control" placeholder="010-1234-5678">
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">비밀번호</label>
                                <div class="col-sm-9">
                                    <input type="password" id="userPassword" name="userPassword" class="form-control" placeholder="비밀번호를 입력하세요" required>
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <label class="col-sm-3 col-form-label text-end">비밀번호 확인</label>
                                <div class="col-sm-9">
                                    <input type="password" id="userPasswordCheck" name="userPasswordCheck" class="form-control" placeholder="비밀번호를 다시 입력하세요" required>
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>

                            <h5 class="card-title mb-4">사업체 정보</h5>

                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">사업체명</label>
                                <div class="col-sm-9">
                                    <input type="text" id="businessName" name="businessName" class="form-control" placeholder="사업체명을 입력하세요">
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">사업자번호</label>
                                <div class="col-sm-9">
                                    <input type="text" id="businessRegistNum" name="businessRegistNum" class="form-control" placeholder="000-00-00000">
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-sm-3 col-form-label text-end">사업장 주소</label>
                                <div class="col-sm-9">
                                    <input type="text" id="businessAddress" name="businessAddress" class="form-control" placeholder="주소를 입력하세요">
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>

                            <div class="row mb-4">
                                <label class="col-sm-3 col-form-label text-end">우편번호</label>
                                <div class="col-sm-9">
                                    <input type="text" id="businessPost" name="businessPost" class="form-control" placeholder="우편번호를 입력하세요">
                                    <div class="invalid-feedback"></div>
                                </div>
                            </div>

                            <div class="text-center">
                                <button type="button" class="btn btn-primary w-50" onclick="handleSignUp()">가입하기</button>
                            </div>

                        </form>

                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        document.getElementById('checkEmailDuplication').addEventListener('click', function () {
            const emailInput = document.getElementById('userEmail');
            const email = emailInput.value.trim();

            if (!email) {
                alert('이메일을 입력해주세요.');
                emailInput.focus();
                return;
            }

            console.log(email);

            fetch('/nonuser/api/signup/check-email', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ userEmail: email })
            })
                .then(response => {
                    console.log(response)
                    return response.json();
                })
                .then(data => {
                    console.log(data);
                    if (data.duplicate) {   // <-- data.duplicate로 읽는다
                        alert('이미 사용 중인 이메일입니다.');
                    } else {
                        alert('사용 가능한 이메일입니다.');
                    }
                })
                .catch(error => {
                    console.error('에러 발생:');
                    console.log(error);
                });

        });


        // 유효성 검사 함수
        // 유효성 검사 조건
        const validators = {
            userLoginId: {
                regex: /^[a-zA-Z0-9_]{4,20}$/,
                message: '아이디는 4~20자, 영문자/숫자/언더스코어만 가능합니다.'
            },
            userName: {
                regex: /^[가-힣a-zA-Z\s]{2,30}$/,
                message: '이름은 한글, 영문, 공백 포함 2~30자여야 합니다.'
            },
            userEmail: {
                regex: /^[^\s@]+@[^\s@]+\.[^\s@]+$/,
                message: '이메일은 example@gmail.com의 형식이어야 합니다.'
            },
            userPhone: {
                regex: /^(01[016789])-?\d{3,4}-?\d{4}$|^\+1-\d{3}-\d{3}-\d{4}$/,
                message: '휴대폰 번호는 - 없이 작성해주세요.',
                optional: true
            },
            userPassword: {
                regex: /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d!@#$%^&*]{8,20}$/,
                message: '비밀번호는 영문+숫자 포함 8~20자여야 합니다.'
            },
            businessName: {
                regex: /^[가-힣a-zA-Z0-9\s]+$/,
                message: '사업체명은 한글, 영문, 숫자, 공백만 허용됩니다.',
                optional: true
            },
            businessRegistNum: {
                regex: /^\d{3}-\d{2}-\d{5}$/,
                message: '사업자번호는 000-00-00000 형식이어야 합니다.'
            },
            businessAddress: {
                regex: /^[가-힣a-zA-Z0-9\s,.-]{5,100}$/,
                message: '주소는 5~100자의 한글, 영문, 숫자, ,-., 공백만 허용됩니다.'
            },
            businessPost: {
                regex: /^\d{5}$|^[A-Z]\d[A-Z] ?\d[A-Z]\d$/,
                message: '우편번호는 5자리 숫자여야 합니다.'
            }
        };

        function validateField(input) {
            const id = input.id;
            const value = input.value.trim();
            const feedback = input.nextElementSibling;

            const rule = validators[id];
            if (!rule) return;

            if (!value && rule.optional) {
                input.classList.remove('is-invalid', 'is-valid');
                feedback.textContent = '';
                return;
            }

            if (!rule.regex.test(value)) {
                input.classList.add('is-invalid');
                input.classList.remove('is-valid'); //  에러일 때 성공 표시 제거
                feedback.textContent = rule.message;
            } else {
                input.classList.remove('is-invalid');
                input.classList.add('is-valid'); //  성공일 때 초록색 체크 표시
                feedback.textContent = '';
            }

            if (id === 'userPassword' || id === 'userPasswordCheck') {
                validatePasswordMatch();
            }
        }


        function validatePasswordMatch() {
            const pw = document.getElementById('userPassword');
            const pwCheck = document.getElementById('userPasswordCheck');
            const pwCheckFeedback = pwCheck.nextElementSibling;

            if (!pwCheck.value) {
                pwCheck.classList.remove('is-invalid', 'is-valid');
                pwCheckFeedback.textContent = '';
                return;
            }

            if (pw.value !== pwCheck.value) {
                pwCheck.classList.add('is-invalid');
                pwCheck.classList.remove('is-valid'); //  불일치할 때 성공 표시 제거
                pwCheckFeedback.textContent = '비밀번호와 일치하지 않습니다.';
            } else {
                pwCheck.classList.remove('is-invalid');
                pwCheck.classList.add('is-valid'); //  일치할 때 초록색 체크 표시
                pwCheckFeedback.textContent = '';
            }
        }


        // 입력 이벤트 연결
        function attachLiveValidation() {
            Object.keys(validators).forEach(id => {
                const input = document.getElementById(id);
                if (input) {
                    input.addEventListener('input', () => validateField(input));
                }
            });

            const pwCheck = document.getElementById('userPasswordCheck');
            if (pwCheck) {
                pwCheck.addEventListener('input', validatePasswordMatch);
            }
        }



        function handleSignUp() {

            // 모든 필드 재검사 후 통과 시 서버 전송
            let isFormValid = true;
            Object.keys(validators).forEach(id => {
                const input = document.getElementById(id);
                validateField(input);
                if (input.classList.contains('is-invalid')) {
                    isFormValid = false;
                }
            });
            validatePasswordMatch();
            const pwCheck = document.getElementById('userPasswordCheck');
            if (pwCheck.classList.contains('is-invalid')) isFormValid = false;

            if (!isFormValid) return;

            // 값을 모으기
            const userLoginId = document.getElementById('userLoginId').value.trim();
            const userPassword = document.getElementById('userPassword').value.trim();
            const userPasswordCheck = document.getElementById('userPasswordCheck').value.trim();
            const userName = document.getElementById('userName').value.trim();
            const userEmail = document.getElementById('userEmail').value.trim();
            const userPhone = document.getElementById('userPhone').value.trim();
            const businessName = document.getElementById('businessName').value.trim();
            const businessRegistNum = document.getElementById('businessRegistNum').value.trim();
            const businessAddress = document.getElementById('businessAddress').value.trim();
            const businessPost = document.getElementById('businessPost').value.trim();

            // if (!userLoginId || !userPassword || !userPasswordCheck || !userName || !userEmail) {
            //     alert('필수 입력값을 모두 입력해주세요.');
            //     return;
            // }
            //
            // if (userPassword !== userPasswordCheck) {
            //     alert('비밀번호가 일치하지 않습니다.');
            //     return;
            // }

            const signUpData = {
                userLoginId,
                userPassword,
                userPasswordCheck,
                userName,
                userEmail,
                userPhone,
                businessName,
                businessRegistNum,
                businessAddress,
                businessPost
            };

            fetch('/nonuser/signup-submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(signUpData)
            })
                .then(response => {
                    if (response.ok) {
                        alert('회원가입이 완료되었습니다.');
                        window.location.href = '/nonuser/login';
                    } else {
                        return response.text().then(text => {
                            alert('회원가입 실패: ' + text);
                        });
                    }
                })
                .catch(error => {
                    console.error('오류 발생:', error);
                    alert('회원가입 중 오류가 발생했습니다.');
                });
        }


        document.addEventListener('DOMContentLoaded', function() {
            attachLiveValidation();
        });
    </script>

</main>
</body>
</html>
